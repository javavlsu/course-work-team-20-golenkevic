<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<div th:replace="~{layout :: layout(~{::section})}">
<section class="max-w-5xl mx-auto px-4 py-8">
    <div class="bg-white rounded-xl shadow-sm p-8">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div th:class="'h-80 bg-gradient-to-br ' + ${product.themeColor} + ' rounded-xl flex items-center justify-center'">
                <img th:if="${product.hasImage}" th:src="@{'/product/' + ${product.id} + '/image'}" class="h-full w-full object-cover rounded-xl"/>
                <i th:unless="${product.hasImage}" class="fas fa-image text-white text-6xl"></i>
            </div>
            <div>
                <h1 class="text-3xl font-bold text-gray-800" th:text="${product.title}"></h1>
                <p class="text-sm text-gray-500 mt-1" th:text="'Категория: ' + ${product.categoryName}"></p>
                <p class="text-sm text-gray-500" th:text="'Состояние: ' + ${product.condition}"></p>
                <p class="text-sm text-gray-500" th:text="'Продавец: ' + ${product.sellerUsername}"></p>
                <p class="text-3xl font-bold text-indigo-600 mt-4" th:text="${product.price} + ' ₽'"></p>
                <p class="text-yellow-500 mt-1" th:if="${product.averageRating != null}">
                    <i class="fas fa-star"></i> <span th:text="${#numbers.formatDecimal(product.averageRating, 1, 1)}"></span>
                    <span class="text-gray-400" th:text="'(' + ${product.reviewsCount} + ' отзывов)'"></span>
                </p>
                <div class="mt-6 flex gap-3" sec:authorize="isAuthenticated()">
                    <form th:action="@{'/cart/add/' + ${product.id}}" method="post">
                        <button class="px-6 py-3 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700"><i class="fas fa-cart-plus"></i> В корзину</button>
                    </form>
                    <form th:if="${!isFavorite}" th:action="@{'/favorites/add/' + ${product.id}}" method="post">
                        <button class="px-6 py-3 bg-pink-50 text-pink-600 rounded-lg hover:bg-pink-100"><i class="far fa-heart"></i> В избранное</button>
                    </form>
                    <form th:if="${isFavorite}" th:action="@{'/favorites/remove/' + ${product.id}}" method="post">
                        <button class="px-6 py-3 bg-pink-600 text-white rounded-lg hover:bg-pink-700"><i class="fas fa-heart"></i> Убрать</button>
                    </form>
                </div>
            </div>
        </div>
        <div class="mt-8">
            <h2 class="text-xl font-semibold text-gray-800 mb-3">Описание</h2>
            <p class="text-gray-600 leading-relaxed" th:text="${productEntity.description}"></p>
        </div>
    </div>
    <!-- Отзывы -->
    <div class="mt-8">
        <h2 class="text-2xl font-semibold text-gray-800 mb-4">Отзывы</h2>
        <div sec:authorize="isAuthenticated()" th:unless="${hasReviewed}" class="bg-white p-6 rounded-xl shadow-sm mb-6">
            <form th:action="@{'/product/' + ${product.id} + '/review'}" method="post" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Оценка (1-5)</label>
                    <select name="rating" required class="px-3 py-2 border rounded-lg">
                        <option value="5">5</option><option value="4">4</option><option value="3">3</option>
                        <option value="2">2</option><option value="1">1</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Текст отзыва</label>
                    <textarea name="text" rows="3" class="w-full px-3 py-2 border rounded-lg"></textarea>
                </div>
                <button type="submit" class="px-6 py-2 bg-emerald-600 text-white rounded-lg hover:bg-emerald-700">Отправить</button>
            </form>
        </div>
        <div th:each="r : ${reviews}" class="bg-white p-4 rounded-xl shadow-sm mb-3">
            <div class="flex items-center gap-2 mb-2">
                <span class="font-semibold text-gray-800" th:text="${r.author.username}"></span>
                <span class="text-yellow-500"><i class="fas fa-star"></i> <span th:text="${r.rating}"></span></span>
            </div>
            <p class="text-gray-600" th:text="${r.text}"></p>
        </div>
    </div>
</section>
</div>
</body>
</html>
