<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${product.title} + ' — MARKETPLACE'">Товар</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #e5e5e5; }</style>
</head>
<body class="min-h-screen flex flex-col bg-[#0a0a0a]">
<div th:replace="~{fragments/header :: header}"></div>
<main class="flex-1 pt-16">
<section class="max-w-[1400px] mx-auto px-6 py-12">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-12">
        <div class="aspect-[3/4] bg-[#161616] overflow-hidden">
            <img th:if="${product.hasImage}" th:src="@{'/product/' + ${product.id} + '/image'}" alt="" class="w-full h-full object-cover"/>
            <div th:unless="${product.hasImage}" class="w-full h-full flex items-center justify-center"><i class="fas fa-image text-white/10 text-6xl"></i></div>
        </div>
        <div class="flex flex-col justify-center">
            <p class="text-white/40 text-[11px] uppercase tracking-[0.2em] mb-2" th:text="${product.categoryName}"></p>
            <h1 class="text-white text-[28px] font-light tracking-wide" th:text="${product.title}"></h1>
            <p class="text-white/50 text-[13px] mt-2">Состояние: <span class="text-white/70" th:text="${product.condition}"></span></p>
            <p class="text-white/50 text-[13px]">Продавец: <span class="text-white/70" th:text="${product.sellerUsername}"></span></p>
            <p class="text-yellow-500/70 text-[13px] mt-1" th:if="${product.averageRating != null}"><i class="fas fa-star text-[11px]"></i> <span th:text="${#numbers.formatDecimal(product.averageRating, 1, 1)}"></span> <span class="text-white/30" th:text="'(' + ${product.reviewsCount} + ')'"></span></p>
            <p class="text-white text-[32px] font-light mt-8" th:text="${product.price} + ' ₽'"></p>
            <div class="flex gap-3 mt-8" sec:authorize="isAuthenticated()">
                <form th:action="@{'/cart/add/' + ${product.id}}" method="post">
                    <button class="px-8 py-3.5 bg-white text-black text-[13px] uppercase tracking-[0.15em] hover:bg-white/90 transition">Добавить в корзину</button>
                </form>
                <form th:if="${!isFavorite}" th:action="@{'/favorites/add/' + ${product.id}}" method="post">
                    <button class="w-12 h-12 border border-white/20 text-white/50 hover:text-white hover:border-white/40 transition flex items-center justify-center"><i class="far fa-heart"></i></button>
                </form>
                <form th:if="${isFavorite}" th:action="@{'/favorites/remove/' + ${product.id}}" method="post">
                    <button class="w-12 h-12 border border-white/20 text-red-400 hover:border-red-400/40 transition flex items-center justify-center"><i class="fas fa-heart"></i></button>
                </form>
            </div>
            <div class="mt-10 pt-8 border-t border-white/10">
                <p class="text-white/40 text-[11px] uppercase tracking-[0.2em] mb-3">Описание</p>
                <p class="text-white/60 text-[14px] leading-relaxed" th:text="${productEntity.description}"></p>
            </div>
        </div>
    </div>
    <div class="mt-16 pt-12 border-t border-white/10">
        <h2 class="text-white text-[13px] uppercase tracking-[0.25em] font-medium mb-8">Отзывы</h2>
        <div sec:authorize="isAuthenticated()" th:unless="${hasReviewed}" class="border border-white/10 p-6 mb-8">
            <form th:action="@{'/product/' + ${product.id} + '/review'}" method="post" class="space-y-4">
                <div class="flex items-center gap-4">
                    <label class="text-white/40 text-[11px] uppercase tracking-[0.2em]">Оценка</label>
                    <select name="rating" required class="bg-[#0a0a0a] border border-white/15 text-white text-[13px] px-3 py-2"><option value="5">5</option><option value="4">4</option><option value="3">3</option><option value="2">2</option><option value="1">1</option></select>
                </div>
                <textarea name="text" rows="3" placeholder="Ваш отзыв..." class="w-full bg-transparent border border-white/15 text-white text-[14px] px-4 py-3 focus:border-white/30 outline-none transition placeholder:text-white/20 resize-none"></textarea>
                <button type="submit" class="px-6 py-2.5 bg-white text-black text-[12px] uppercase tracking-[0.15em] hover:bg-white/90 transition">Отправить</button>
            </form>
        </div>
        <div th:each="r : ${reviews}" class="border-b border-white/5 py-5">
            <div class="flex items-center gap-3 mb-2"><span class="text-white/80 text-[13px] font-medium" th:text="${r.author.username}"></span><span class="text-yellow-500/70 text-[12px]"><i class="fas fa-star text-[10px]"></i> <span th:text="${r.rating}"></span></span></div>
            <p class="text-white/50 text-[14px]" th:text="${r.text}"></p>
        </div>
    </div>
</section>
</main>
<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
