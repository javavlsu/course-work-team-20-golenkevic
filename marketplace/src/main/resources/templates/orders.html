<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:replace="~{layout :: layout(~{::section})}">
<section class="max-w-5xl mx-auto px-4 py-8">
    <h1 class="text-3xl font-bold text-gray-800 mb-6">Мои заказы</h1>
    <div th:if="${#lists.isEmpty(orders)}" class="text-center py-16 text-gray-400">
        <p class="text-xl">Заказов пока нет</p>
    </div>
    <div th:each="order : ${orders}" class="bg-white rounded-xl shadow-sm p-6 mb-4">
        <div class="flex justify-between items-center mb-3">
            <span class="font-semibold text-gray-800">Заказ #<span th:text="${order.id}"></span></span>
            <span class="px-3 py-1 rounded-full text-sm font-medium"
                  th:class="${order.status.name() == 'NEW'} ? 'bg-blue-100 text-blue-700' :
                             ${order.status.name() == 'COMPLETED'} ? 'bg-green-100 text-green-700' :
                             ${order.status.name() == 'CANCELLED'} ? 'bg-red-100 text-red-700' : 'bg-yellow-100 text-yellow-700'"
                  th:text="${order.status}"></span>
        </div>
        <p class="text-sm text-gray-500" th:text="'Сумма: ' + ${order.totalAmount} + ' ₽'"></p>
        <p class="text-sm text-gray-500" th:text="'Адрес: ' + ${order.deliveryAddress}"></p>
        <div class="mt-3 space-y-1">
            <div th:each="item : ${order.items}" class="text-sm text-gray-600">
                <span th:text="${item.product.title}"></span> x<span th:text="${item.quantity}"></span>
                — <span th:text="${item.price} + ' ₽'"></span>
            </div>
        </div>
    </div>
</section>
</div>
</body>
</html>
