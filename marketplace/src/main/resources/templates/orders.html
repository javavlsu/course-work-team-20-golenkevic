<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARKETPLACE — Заказы</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #e5e5e5; }</style>
</head>
<body class="min-h-screen flex flex-col bg-[#0a0a0a]">
<div th:replace="~{fragments/header :: header}"></div>
<main class="flex-1 pt-16">
<section class="max-w-[900px] mx-auto px-6 py-12">
    <h1 class="text-white text-[13px] uppercase tracking-[0.25em] font-medium mb-10">Мои заказы</h1>
    <div th:if="${#lists.isEmpty(orders)}" class="text-center py-24">
        <p class="text-white/30 text-[15px]">Заказов пока нет</p>
    </div>
    <div th:each="order : ${orders}" class="border border-white/10 p-6 mb-4">
        <div class="flex justify-between items-center mb-3">
            <span class="text-white/80 text-[14px]">Заказ #<span th:text="${order.id}"></span></span>
            <span class="text-[12px] uppercase tracking-wider px-3 py-1"
                  th:class="${order.status.name() == 'NEW'} ? 'bg-blue-500/10 text-blue-400' :
                             ${order.status.name() == 'COMPLETED'} ? 'bg-emerald-500/10 text-emerald-400' :
                             ${order.status.name() == 'CANCELLED'} ? 'bg-red-500/10 text-red-400' : 'bg-yellow-500/10 text-yellow-400'"
                  th:text="${order.status}"></span>
        </div>
        <p class="text-white/40 text-[13px]">Сумма: <span class="text-white/70" th:text="${order.totalAmount} + ' ₽'"></span></p>
        <p class="text-white/40 text-[13px]">Адрес: <span class="text-white/70" th:text="${order.deliveryAddress}"></span></p>
        <div class="mt-3 pt-3 border-t border-white/5 space-y-1">
            <div th:each="item : ${order.items}" class="text-white/50 text-[13px]">
                <span th:text="${item.product.title}"></span> x<span th:text="${item.quantity}"></span> — <span th:text="${item.price} + ' ₽'"></span>
            </div>
        </div>
    </div>
</section>
</main>
<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
