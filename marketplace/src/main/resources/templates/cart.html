<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARKETPLACE — Корзина</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #e5e5e5; }</style>
</head>
<body class="min-h-screen flex flex-col bg-[#0a0a0a]">
<div th:replace="~{fragments/header :: header}"></div>
<main class="flex-1 pt-16">
<section class="max-w-[1200px] mx-auto px-6 py-12">

    <!-- Заголовок -->
    <div class="flex items-baseline gap-3 mb-10">
        <h1 class="text-white text-[13px] uppercase tracking-[0.25em] font-medium">Корзина</h1>
        <span class="text-white/25 text-[12px]" th:text="${#lists.size(cartItems)} + ' товаров'"></span>
    </div>

    <!-- Пустая корзина -->
    <div th:if="${#lists.isEmpty(cartItems)}" class="py-32 text-center">
        <i class="fas fa-shopping-bag text-white/8 text-6xl mb-8"></i>
        <p class="text-white/30 text-[13px] uppercase tracking-[0.2em] mb-6">Корзина пуста</p>
        <a href="/catalog"
           class="inline-block px-8 py-3 border border-white/20 text-white/60 text-[12px] uppercase tracking-[0.2em] hover:border-white/40 hover:text-white/80 transition">
            Перейти в каталог
        </a>
    </div>

    <!-- Содержимое корзины -->
    <div th:unless="${#lists.isEmpty(cartItems)}" class="grid grid-cols-1 lg:grid-cols-[1fr_360px] gap-10 items-start">

        <!-- Список товаров -->
        <div>
            <div th:each="item : ${cartItems}"
                 class="group flex gap-5 py-6 border-b border-white/8 hover:border-white/15 transition-colors">

                <!-- Фото -->
                <a th:href="@{'/product/' + ${item.product.id}}"
                   class="flex-shrink-0 w-24 h-32 bg-[#161616] overflow-hidden block">
                    <img th:if="${item.product.imageData != null}"
                         th:src="@{'/product/' + ${item.product.id} + '/image'}"
                         alt="" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500"/>
                    <div th:unless="${item.product.imageData != null}"
                         class="w-full h-full flex items-center justify-center">
                        <i class="fas fa-image text-white/10 text-xl"></i>
                    </div>
                </a>

                <!-- Инфо -->
                <div class="flex-1 min-w-0 flex flex-col justify-between py-1">
                    <div>
                        <a th:href="@{'/product/' + ${item.product.id}}"
                           class="text-white/85 text-[14px] hover:text-white transition line-clamp-2 leading-snug"
                           th:text="${item.product.title}"></a>
                        <p class="text-white/30 text-[11px] uppercase tracking-[0.15em] mt-1.5"
                           th:text="${item.product.category != null ? item.product.category.name : ''}"></p>
                    </div>
                    <div class="flex items-center gap-4 mt-3">
                        <span class="text-white/30 text-[12px]">
                            <i class="fas fa-cube text-[10px] mr-1"></i>
                            Кол-во: <span th:text="${item.quantity}"></span>
                        </span>
                    </div>
                </div>

                <!-- Цена + удалить -->
                <div class="flex flex-col items-end justify-between flex-shrink-0">
                    <p class="text-white text-[16px] font-medium" th:text="${item.product.price} + ' ₽'"></p>
                    <form th:action="@{'/cart/remove/' + ${item.product.id}}" method="post">
                        <button class="text-white/20 hover:text-red-400/80 transition text-[12px] flex items-center gap-1.5">
                            <i class="fas fa-trash-alt text-[11px]"></i>
                            <span class="hidden sm:inline uppercase tracking-[0.1em]">Убрать</span>
                        </button>
                    </form>
                </div>
            </div>

            <!-- Продолжить покупки -->
            <div class="mt-6">
                <a href="/catalog"
                   class="text-white/30 text-[12px] uppercase tracking-[0.15em] hover:text-white/60 transition">
                    <i class="fas fa-arrow-left text-[10px] mr-2"></i>Продолжить покупки
                </a>
            </div>
        </div>

        <!-- Итог (sticky) -->
        <div class="lg:sticky lg:top-24">
            <div class="bg-[#111] border border-white/8 p-8">
                <p class="text-white/40 text-[11px] uppercase tracking-[0.25em] mb-6">Ваш заказ</p>

                <!-- Позиции -->
                <div class="space-y-3 mb-6">
                    <div th:each="item : ${cartItems}" class="flex justify-between items-start gap-4">
                        <span class="text-white/55 text-[13px] line-clamp-1 flex-1" th:text="${item.product.title}"></span>
                        <span class="text-white/70 text-[13px] flex-shrink-0" th:text="${item.product.price} + ' ₽'"></span>
                    </div>
                </div>

                <!-- Итого -->
                <div class="border-t border-white/10 pt-5 mb-8">
                    <div class="flex justify-between items-center">
                        <span class="text-white/50 text-[12px] uppercase tracking-[0.15em]">Итого</span>
                        <span class="text-white text-[22px] font-light" th:text="${total} + ' ₽'"></span>
                    </div>
                </div>

                <!-- Кнопка -->
                <a href="/orders/checkout"
                   class="block w-full py-4 bg-white text-black text-center text-[12px] uppercase tracking-[0.25em] font-medium hover:bg-white/90 active:bg-white/80 transition">
                    Оформить заказ
                </a>

                <!-- Безопасность -->
                <p class="text-center text-white/20 text-[11px] mt-4 flex items-center justify-center gap-1.5">
                    <i class="fas fa-lock text-[9px]"></i> Безопасная оплата
                </p>
            </div>
        </div>
    </div>

</section>
</main>
<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
