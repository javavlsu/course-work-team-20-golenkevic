<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARKETPLACE — Пользователи</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #e5e5e5; }</style>
</head>
<body class="min-h-screen flex flex-col bg-[#0a0a0a]">
<div th:replace="~{fragments/header :: header}"></div>
<main class="flex-1 pt-16">
<div class="max-w-[1200px] mx-auto px-6 py-12">

    <!-- Хлебные крошки -->
    <nav class="flex items-center gap-2 text-[11px] uppercase tracking-[0.15em] text-white/25 mb-6">
        <a href="/admin/dashboard" class="hover:text-white/50 transition">Админ-панель</a>
        <span>/</span>
        <span class="text-white/50">Пользователи</span>
    </nav>

    <!-- Заголовок -->
    <div class="flex items-end justify-between mb-8 pb-6 border-b border-white/10">
        <div>
            <h1 class="text-white text-[24px] font-light tracking-wide">Пользователи</h1>
            <p class="text-white/30 text-[12px] mt-1" th:text="'Всего: ' + ${users.totalElements}"></p>
        </div>
    </div>

    <!-- Фильтры -->
    <form method="get" action="/admin/users" class="flex flex-wrap gap-2 mb-6">
        <div class="relative flex-1 min-w-[200px] max-w-xs">
            <i class="fas fa-search absolute left-3.5 top-1/2 -translate-y-1/2 text-white/25 text-[12px]"></i>
            <input type="text" name="search" th:value="${param.search}" placeholder="Поиск по имени или email..."
                   class="w-full bg-[#1a1a1a] border border-white/10 text-white text-[13px] pl-10 pr-4 py-2.5 focus:border-white/30 outline-none transition placeholder:text-white/25">
        </div>
        <select name="role" class="bg-[#1a1a1a] border border-white/10 text-white/70 text-[13px] px-4 py-2.5 focus:border-white/30 outline-none transition">
            <option value="">Все роли</option>
            <option th:each="r : ${roles}" th:value="${r}" th:text="${r}" th:selected="${param.role != null and param.role[0] == r.name()}"></option>
        </select>
        <button type="submit" class="px-5 py-2.5 bg-white text-black text-[11px] uppercase tracking-[0.15em] hover:bg-white/90 transition">Найти</button>
        <a th:if="${param.search != null or param.role != null}" href="/admin/users"
           class="flex items-center gap-1.5 px-3 text-white/35 text-[11px] uppercase tracking-[0.1em] hover:text-white/70 transition">
            <i class="fas fa-times text-[10px]"></i> Сбросить
        </a>
    </form>

    <!-- Таблица пользователей -->
    <div class="bg-[#111] border border-white/8 overflow-hidden">

        <!-- Шапка таблицы (десктоп) -->
        <div class="hidden md:grid md:grid-cols-[60px_1fr_1.2fr_120px_120px_120px] gap-4 px-5 py-3 border-b border-white/8 text-[10px] uppercase tracking-[0.15em] text-white/30">
            <div>ID</div>
            <div>Пользователь</div>
            <div>Email</div>
            <div>Роль</div>
            <div>Статус</div>
            <div class="text-right">Действия</div>
        </div>

        <!-- Пусто -->
        <div th:if="${#lists.isEmpty(users.content)}" class="py-16 text-center">
            <i class="fas fa-user-slash text-white/8 text-4xl mb-4"></i>
            <p class="text-white/25 text-[12px] uppercase tracking-[0.2em]">Пользователи не найдены</p>
        </div>

        <!-- Строки -->
        <div th:each="u : ${users.content}"
             class="md:grid md:grid-cols-[60px_1fr_1.2fr_120px_120px_120px] gap-4 px-5 py-4 border-b border-white/5 hover:bg-white/[0.02] transition flex flex-col items-start">

            <!-- ID -->
            <div class="text-white/30 text-[12px] hidden md:block" th:text="${u.id}"></div>

            <!-- Пользователь -->
            <div class="flex items-center gap-3 min-w-0 w-full md:w-auto">
                <div class="w-9 h-9 bg-[#1a1a1a] rounded-full flex items-center justify-center flex-shrink-0 overflow-hidden">
                    <img th:if="${u.profilePic != null}" th:src="@{'/profile/' + ${u.id} + '/avatar'}"
                         alt="" class="w-full h-full object-cover"/>
                    <i th:unless="${u.profilePic != null}" class="fas fa-user text-white/20 text-[12px]"></i>
                </div>
                <div class="min-w-0">
                    <p class="text-white/85 text-[13px] font-medium truncate" th:text="${u.username}"></p>
                    <p class="md:hidden text-white/30 text-[11px] truncate" th:text="${u.email}"></p>
                </div>
            </div>

            <!-- Email (только десктоп) -->
            <div class="hidden md:block min-w-0">
                <p class="text-white/45 text-[12px] truncate" th:text="${u.email}"></p>
            </div>

            <!-- Роль -->
            <div class="mt-2 md:mt-0">
                <span class="text-[10px] uppercase tracking-[0.15em] px-2.5 py-1 inline-block"
                      th:classappend="${u.role.name() == 'admin'}      ? 'bg-red-500/10 text-red-400 border border-red-500/20' :
                                       (${u.role.name() == 'moderator'}  ? 'bg-purple-500/10 text-purple-400 border border-purple-500/20' :
                                       (${u.role.name() == 'seller'}     ? 'bg-emerald-500/10 text-emerald-400 border border-emerald-500/20' :
                                                                         'bg-white/5 text-white/50 border border-white/10'))"
                      th:text="${u.role}"></span>
            </div>

            <!-- Статус -->
            <div class="mt-2 md:mt-0">
                <span th:if="${u.active}" class="flex items-center gap-1.5 text-emerald-400/80 text-[11px]">
                    <span class="w-1.5 h-1.5 rounded-full bg-emerald-400"></span> Активен
                </span>
                <span th:unless="${u.active}" class="flex items-center gap-1.5 text-red-400/70 text-[11px]">
                    <span class="w-1.5 h-1.5 rounded-full bg-red-400"></span> Заблокирован
                </span>
            </div>

            <!-- Действия -->
            <div class="flex md:justify-end gap-1 mt-3 md:mt-0">
                <button th:if="${u.active}"
                        th:onclick="'toggleBlock(' + ${u.id} + ', false)'"
                        class="px-3 py-1.5 border border-white/10 text-white/40 text-[11px] uppercase tracking-[0.1em] hover:text-red-400 hover:border-red-400/30 transition flex items-center gap-1.5">
                    <i class="fas fa-ban text-[10px]"></i> Блок
                </button>
                <button th:unless="${u.active}"
                        th:onclick="'toggleBlock(' + ${u.id} + ', true)'"
                        class="px-3 py-1.5 border border-emerald-400/20 text-emerald-400/70 text-[11px] uppercase tracking-[0.1em] hover:text-emerald-400 hover:border-emerald-400/40 transition flex items-center gap-1.5">
                    <i class="fas fa-unlock text-[10px]"></i> Разблок
                </button>
            </div>
        </div>
    </div>

    <!-- Пагинация -->
    <div th:if="${totalPages > 1}" class="mt-8 flex justify-center gap-1">
        <a th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
           th:href="@{/admin/users(page=${i}, search=${param.search}, role=${param.role})}"
           th:text="${i + 1}"
           th:class="${i == currentPage}
               ? 'w-9 h-9 flex items-center justify-center bg-white text-black text-[12px]'
               : 'w-9 h-9 flex items-center justify-center border border-white/10 text-white/45 text-[12px] hover:border-white/30 hover:text-white/70 transition'">
        </a>
    </div>

</div>
</main>

<!-- Уведомление -->
<div id="toast" class="fixed bottom-6 right-6 bg-[#111] border border-white/15 px-5 py-3 text-[12px] text-white/80 hidden translate-y-2 opacity-0 transition-all duration-300">
    <span id="toast-text"></span>
</div>

<script>
    function showToast(text) {
        const toast = document.getElementById('toast');
        document.getElementById('toast-text').textContent = text;
        toast.classList.remove('hidden');
        requestAnimationFrame(() => {
            toast.classList.remove('translate-y-2', 'opacity-0');
        });
        setTimeout(() => {
            toast.classList.add('translate-y-2', 'opacity-0');
            setTimeout(() => toast.classList.add('hidden'), 300);
        }, 1800);
    }

    function toggleBlock(userId, unblock) {
        const action = unblock ? 'unblock' : 'block';
        fetch(`/admin/users/${userId}/${action}`, { method: 'POST' })
            .then(r => r.text())
            .then(() => {
                showToast(unblock ? 'Разблокирован' : 'Заблокирован');
                setTimeout(() => location.reload(), 600);
            })
            .catch(() => showToast('Ошибка'));
    }
</script>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
