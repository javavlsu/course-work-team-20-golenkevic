<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:replace="~{layout :: layout(~{::section})}">
<section class="max-w-6xl mx-auto px-4 py-8">
    <h1 class="text-3xl font-bold text-gray-800 mb-6">Управление пользователями</h1>
    <div class="bg-white rounded-xl shadow-sm overflow-hidden">
        <table class="w-full">
            <thead class="bg-gray-50">
                <tr>
                    <th class="px-4 py-3 text-left text-sm font-medium text-gray-500">ID</th>
                    <th class="px-4 py-3 text-left text-sm font-medium text-gray-500">Имя</th>
                    <th class="px-4 py-3 text-left text-sm font-medium text-gray-500">Email</th>
                    <th class="px-4 py-3 text-left text-sm font-medium text-gray-500">Роль</th>
                    <th class="px-4 py-3 text-left text-sm font-medium text-gray-500">Статус</th>
                    <th class="px-4 py-3 text-left text-sm font-medium text-gray-500">Действия</th>
                </tr>
            </thead>
            <tbody class="divide-y">
                <tr th:each="u : ${users}">
                    <td class="px-4 py-3 text-sm" th:text="${u.id}"></td>
                    <td class="px-4 py-3 text-sm font-medium" th:text="${u.username}"></td>
                    <td class="px-4 py-3 text-sm text-gray-500" th:text="${u.email}"></td>
                    <td class="px-4 py-3">
                        <span class="px-2 py-1 text-xs rounded-full"
                              th:class="${u.role.name() == 'admin'} ? 'bg-red-100 text-red-700' :
                                         ${u.role.name() == 'moderator'} ? 'bg-purple-100 text-purple-700' :
                                         ${u.role.name() == 'seller'} ? 'bg-emerald-100 text-emerald-700' : 'bg-gray-100 text-gray-700'"
                              th:text="${u.role}"></span>
                    </td>
                    <td class="px-4 py-3">
                        <span th:if="${u.active}" class="text-green-600 text-sm">Активен</span>
                        <span th:unless="${u.active}" class="text-red-600 text-sm">Заблокирован</span>
                    </td>
                    <td class="px-4 py-3 flex gap-1">
                        <form th:if="${u.active}" th:action="@{'/admin/users/' + ${u.id} + '/block'}" method="post">
                            <button class="px-2 py-1 text-xs bg-red-50 text-red-600 rounded hover:bg-red-100">Блок</button>
                        </form>
                        <form th:unless="${u.active}" th:action="@{'/admin/users/' + ${u.id} + '/unblock'}" method="post">
                            <button class="px-2 py-1 text-xs bg-green-50 text-green-600 rounded hover:bg-green-100">Разблок</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</section>
</div>
</body>
</html>
