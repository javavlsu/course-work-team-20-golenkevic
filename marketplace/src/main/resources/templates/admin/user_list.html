<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARKETPLACE — Пользователи</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #e5e5e5; }</style>
</head>
<body class="min-h-screen flex flex-col bg-[#0a0a0a]">
<div th:replace="~{fragments/header :: header}"></div>
<main class="flex-1 pt-16">
<section class="max-w-[1100px] mx-auto px-6 py-12">
    <h1 class="text-white text-[13px] uppercase tracking-[0.25em] font-medium mb-10">Управление пользователями</h1>
    <div class="border border-white/10 overflow-hidden">
        <table class="w-full">
            <thead>
                <tr class="border-b border-white/10">
                    <th class="px-4 py-3 text-left text-[11px] text-white/40 uppercase tracking-wider">ID</th>
                    <th class="px-4 py-3 text-left text-[11px] text-white/40 uppercase tracking-wider">Имя</th>
                    <th class="px-4 py-3 text-left text-[11px] text-white/40 uppercase tracking-wider">Email</th>
                    <th class="px-4 py-3 text-left text-[11px] text-white/40 uppercase tracking-wider">Роль</th>
                    <th class="px-4 py-3 text-left text-[11px] text-white/40 uppercase tracking-wider">Статус</th>
                    <th class="px-4 py-3 text-left text-[11px] text-white/40 uppercase tracking-wider">Действия</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="u : ${users}" class="border-b border-white/5 hover:bg-white/[0.02] transition">
                    <td class="px-4 py-3 text-white/50 text-[13px]" th:text="${u.id}"></td>
                    <td class="px-4 py-3 text-white/80 text-[13px]" th:text="${u.username}"></td>
                    <td class="px-4 py-3 text-white/50 text-[13px]" th:text="${u.email}"></td>
                    <td class="px-4 py-3">
                        <span class="text-[11px] uppercase tracking-wider px-2 py-0.5"
                              th:class="${u.role.name() == 'admin'} ? 'bg-red-500/10 text-red-400' :
                                         ${u.role.name() == 'moderator'} ? 'bg-purple-500/10 text-purple-400' :
                                         ${u.role.name() == 'seller'} ? 'bg-emerald-500/10 text-emerald-400' : 'bg-white/5 text-white/50'"
                              th:text="${u.role}"></span>
                    </td>
                    <td class="px-4 py-3">
                        <span th:if="${u.active}" class="text-emerald-400 text-[12px]">Активен</span>
                        <span th:unless="${u.active}" class="text-red-400 text-[12px]">Заблокирован</span>
                    </td>
                    <td class="px-4 py-3 flex gap-1">
                        <form th:if="${u.active}" th:action="@{'/admin/users/' + ${u.id} + '/block'}" method="post">
                            <button class="px-3 py-1 text-[11px] border border-white/10 text-white/40 hover:text-red-400 hover:border-red-400/30 transition">Блок</button>
                        </form>
                        <form th:unless="${u.active}" th:action="@{'/admin/users/' + ${u.id} + '/unblock'}" method="post">
                            <button class="px-3 py-1 text-[11px] border border-white/10 text-white/40 hover:text-emerald-400 hover:border-emerald-400/30 transition">Разблок</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</section>
</main>
<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
