<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:replace="~{layout :: layout(~{::section})}">
<section class="max-w-5xl mx-auto px-4 py-8">
    <h1 class="text-3xl font-bold text-gray-800 mb-6"><i class="fas fa-chart-bar"></i> Панель администратора</h1>
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
        <div class="bg-white p-6 rounded-xl shadow-sm text-center">
            <i class="fas fa-users text-3xl text-indigo-500 mb-2"></i>
            <p class="text-3xl font-bold text-gray-800" th:text="${totalUsers}"></p>
            <p class="text-gray-500">Пользователей</p>
        </div>
        <div class="bg-white p-6 rounded-xl shadow-sm text-center">
            <i class="fas fa-box text-3xl text-emerald-500 mb-2"></i>
            <p class="text-3xl font-bold text-gray-800" th:text="${totalProducts}"></p>
            <p class="text-gray-500">Товаров</p>
        </div>
        <div class="bg-white p-6 rounded-xl shadow-sm text-center">
            <i class="fas fa-shopping-bag text-3xl text-amber-500 mb-2"></i>
            <p class="text-3xl font-bold text-gray-800" th:text="${totalOrders}"></p>
            <p class="text-gray-500">Заказов</p>
        </div>
        <div class="bg-white p-6 rounded-xl shadow-sm text-center">
            <i class="fas fa-clock text-3xl text-red-500 mb-2"></i>
            <p class="text-3xl font-bold text-gray-800" th:text="${pendingProducts}"></p>
            <p class="text-gray-500">На модерации</p>
        </div>
    </div>
    <a href="/admin/users" class="px-6 py-3 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700">Управление пользователями</a>
    <a href="/moderation" class="px-6 py-3 bg-emerald-600 text-white rounded-lg hover:bg-emerald-700 ml-3">Модерация</a>
</section>
</div>
</body>
</html>
