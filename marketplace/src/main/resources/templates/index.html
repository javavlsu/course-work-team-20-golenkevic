<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARKETPLACE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #e5e5e5; }

        /* Hero — кроссфейд между фото */
        .hero-slide {
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity 1.2s ease-in-out;
            background-size: cover;
            background-position: center;
        }
        .hero-slide.active { opacity: 1; }

        /* Анимированный заголовок */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .caption { animation: slideUp 0.8s ease 0.4s both; }

        /* Индикаторы слайдов */
        .dot { transition: all 0.3s ease; }
        .dot.active { width: 32px; background: rgba(255,255,255,0.95); }
    </style>
</head>
<body class="min-h-screen flex flex-col bg-[#0a0a0a]">
<div th:replace="~{fragments/header :: header}"></div>
<main class="flex-1 pt-16">

<!-- ═══ HERO — фото-карусель ═══ -->
<section class="relative w-full h-[calc(100vh-4rem)] overflow-hidden">

    <!-- Слайды (фото с кроссфейдом) -->
    <div id="hero-slides" class="absolute inset-0">
        <div class="hero-slide active" style="background-image: url('/photoformain/photo_1_2026-04-26_17-20-42.jpg')"></div>
        <div class="hero-slide" style="background-image: url('/photoformain/photo_2_2026-04-26_17-20-42.jpg')"></div>
        <div class="hero-slide" style="background-image: url('/photoformain/photo_3_2026-04-26_17-20-42.jpg')"></div>
        <div class="hero-slide" style="background-image: url('/photoformain/photo_4_2026-04-26_17-20-42.jpg')"></div>
        <div class="hero-slide" style="background-image: url('/photoformain/photo_5_2026-04-26_17-20-42.jpg')"></div>
        <div class="hero-slide" style="background-image: url('/photoformain/photo_6_2026-04-26_17-20-42.jpg')"></div>
        <div class="hero-slide" style="background-image: url('/photoformain/photo_7_2026-04-26_17-20-42.jpg')"></div>
        <div class="hero-slide" style="background-image: url('/photoformain/photo_8_2026-04-26_17-20-42.jpg')"></div>
        <div class="hero-slide" style="background-image: url('/photoformain/photo_9_2026-04-26_17-20-42.jpg')"></div>
    </div>

    <!-- Затемнение -->
    <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-black/40 pointer-events-none"></div>

    <!-- Контент -->
    <div class="relative h-full flex flex-col justify-end items-start px-6 sm:px-12 lg:px-20 pb-20 max-w-[1600px] mx-auto">
        <p class="caption text-white/70 text-[11px] uppercase tracking-[0.4em] mb-4">Новая коллекция</p>
        <h1 class="caption text-white text-[44px] sm:text-[64px] lg:text-[88px] font-bold tracking-tight leading-[0.95] uppercase">
            MARKETPLACE<br>
            <span class="text-white/50 font-light">COLLECTION 2026</span>
        </h1>
        <div class="caption mt-8 flex flex-col sm:flex-row gap-3">
            <a href="/catalog"
               class="inline-flex items-center gap-2 px-8 py-3.5 bg-white text-black text-[12px] uppercase tracking-[0.25em] hover:bg-white/90 transition">
                Смотреть каталог
                <i class="fas fa-arrow-right text-[10px]"></i>
            </a>
            <a href="/catalog?sort=createdAt"
               class="inline-flex items-center gap-2 px-8 py-3.5 border border-white/30 text-white text-[12px] uppercase tracking-[0.25em] hover:bg-white/10 transition">
                Новинки
            </a>
        </div>
    </div>

    <!-- Индикаторы (точки) -->
    <div class="absolute bottom-8 right-6 sm:right-12 lg:right-20 flex gap-2 z-10">
        <button th:each="i : ${#numbers.sequence(0, 8)}"
                th:onclick="'goToSlide(' + ${i} + ')'"
                th:class="${i == 0} ? 'dot active w-8 h-1 bg-white/95' : 'dot w-4 h-1 bg-white/30 hover:bg-white/60'"></button>
    </div>

    <!-- Стрелки -->
    <button onclick="prevSlide()" aria-label="Предыдущее"
            class="absolute left-4 sm:left-8 top-1/2 -translate-y-1/2 w-12 h-12 flex items-center justify-center text-white/40 hover:text-white transition z-10">
        <i class="fas fa-chevron-left text-[16px]"></i>
    </button>
    <button onclick="nextSlide()" aria-label="Следующее"
            class="absolute right-4 sm:right-8 top-1/2 -translate-y-1/2 w-12 h-12 flex items-center justify-center text-white/40 hover:text-white transition z-10">
        <i class="fas fa-chevron-right text-[16px]"></i>
    </button>

    <!-- Скролл-индикатор -->
    <div class="absolute bottom-6 left-1/2 -translate-x-1/2 hidden sm:flex flex-col items-center gap-2 text-white/40 text-[10px] uppercase tracking-[0.3em]">
        <span>Scroll</span>
        <i class="fas fa-chevron-down animate-bounce text-[10px]"></i>
    </div>
</section>

<!-- ═══ КАТЕГОРИИ-ССЫЛКИ ═══ -->
<section class="border-y border-white/10 bg-[#0a0a0a]">
    <div class="max-w-[1400px] mx-auto px-6 py-6 flex flex-wrap items-center justify-center gap-x-8 gap-y-3 text-[11px] uppercase tracking-[0.25em]">
        <a href="/catalog?sort=createdAt" class="text-white/85 hover:text-white transition">Новинки</a>
        <span class="text-white/15">·</span>
        <a href="/catalog" class="text-white/60 hover:text-white transition">Одежда</a>
        <span class="text-white/15">·</span>
        <a href="/catalog" class="text-white/60 hover:text-white transition">Обувь</a>
        <span class="text-white/15">·</span>
        <a href="/catalog" class="text-white/60 hover:text-white transition">Аксессуары</a>
        <span class="text-white/15">·</span>
        <a href="/catalog" class="text-white/60 hover:text-white transition">Электроника</a>
        <span class="text-white/15">·</span>
        <a href="/seller/products/new" class="text-red-400/85 hover:text-red-400 transition" sec:authorize="hasAnyAuthority('ROLE_seller','ROLE_admin')">Продать</a>
    </div>
</section>

<!-- ═══ НОВИНКИ ═══ -->
<section class="max-w-[1400px] mx-auto px-6 pt-20 pb-16">
    <div class="flex items-center justify-between mb-8">
        <h2 class="text-white text-[13px] uppercase tracking-[0.25em] font-medium">Новинки</h2>
        <a href="/catalog?sort=createdAt" class="text-white/40 text-[12px] uppercase tracking-[0.15em] hover:text-white transition">Все →</a>
    </div>
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
        <a th:each="p : ${newest}" th:href="@{'/product/' + ${p.id}}" class="group block">
            <div class="aspect-[3/4] bg-[#161616] overflow-hidden relative">
                <img th:if="${p.hasImage}" th:src="@{'/product/' + ${p.id} + '/image'}" alt=""
                     class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500"/>
                <div th:unless="${p.hasImage}" class="w-full h-full flex items-center justify-center">
                    <i class="fas fa-image text-white/10 text-4xl"></i>
                </div>
                <div class="absolute inset-0 bg-gradient-to-t from-black/85 via-black/10 to-transparent"></div>
                <div class="absolute bottom-0 left-0 right-0 p-4 translate-y-1 group-hover:translate-y-0 transition-transform duration-300">
                    <p class="text-white text-[13px] leading-snug line-clamp-2 mb-2" th:text="${p.title}"></p>
                    <p class="text-white text-[15px] font-semibold" th:text="${p.price} + ' ₽'"></p>
                </div>
            </div>
        </a>
    </div>
</section>

<!-- ═══ ПОПУЛЯРНЫЕ ═══ -->
<section class="max-w-[1400px] mx-auto px-6 pb-24">
    <div class="flex items-center justify-between mb-8">
        <h2 class="text-white text-[13px] uppercase tracking-[0.25em] font-medium">Популярные</h2>
        <a href="/catalog" class="text-white/40 text-[12px] uppercase tracking-[0.15em] hover:text-white transition">Все →</a>
    </div>
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
        <a th:each="p : ${popular}" th:href="@{'/product/' + ${p.id}}" class="group block">
            <div class="aspect-[3/4] bg-[#161616] overflow-hidden relative">
                <img th:if="${p.hasImage}" th:src="@{'/product/' + ${p.id} + '/image'}" alt=""
                     class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500"/>
                <div th:unless="${p.hasImage}" class="w-full h-full flex items-center justify-center">
                    <i class="fas fa-image text-white/10 text-4xl"></i>
                </div>
                <div class="absolute inset-0 bg-gradient-to-t from-black/85 via-black/10 to-transparent"></div>
                <div class="absolute bottom-0 left-0 right-0 p-4 translate-y-1 group-hover:translate-y-0 transition-transform duration-300">
                    <p class="text-white text-[13px] leading-snug line-clamp-2 mb-2" th:text="${p.title}"></p>
                    <p class="text-white text-[15px] font-semibold" th:text="${p.price} + ' ₽'"></p>
                </div>
            </div>
        </a>
    </div>
</section>

</main>

<script>
    (function() {
        const slides = document.querySelectorAll('.hero-slide');
        const dots = document.querySelectorAll('.dot');
        let current = 0;
        let timer;

        function show(index) {
            slides[current].classList.remove('active');
            dots[current].classList.remove('active', 'w-8', 'bg-white/95');
            dots[current].classList.add('w-4', 'bg-white/30');
            current = (index + slides.length) % slides.length;
            slides[current].classList.add('active');
            dots[current].classList.add('active', 'w-8', 'bg-white/95');
            dots[current].classList.remove('w-4', 'bg-white/30');
        }

        function next() { show(current + 1); }

        window.prevSlide = () => { show(current - 1); reset(); };
        window.nextSlide = () => { next(); reset(); };
        window.goToSlide = (i) => { show(i); reset(); };

        function reset() {
            clearInterval(timer);
            timer = setInterval(next, 5000);
        }
        reset();

        // Pause when tab is hidden
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) clearInterval(timer);
            else reset();
        });
    })();
</script>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
