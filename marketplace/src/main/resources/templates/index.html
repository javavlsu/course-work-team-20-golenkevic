<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARKETPLACE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #e5e5e5; }</style>
</head>
<body class="min-h-screen flex flex-col bg-[#0a0a0a]">
<div th:replace="~{fragments/header :: header}"></div>
<main class="flex-1 pt-16">

<!-- Hero -->
<section class="h-[70vh] flex flex-col items-center justify-center text-center px-6">
    <p class="text-white/40 text-[12px] uppercase tracking-[0.4em] mb-4">resale concept store</p>
    <h1 class="text-white text-[48px] md:text-[72px] font-light tracking-[0.15em] uppercase leading-none">MARKETPLACE</h1>
    <p class="text-white/50 text-[15px] mt-6 max-w-md">Покупайте и продавайте уникальные товары</p>
    <a href="/catalog" class="mt-10 px-10 py-3.5 border border-white/30 text-white text-[13px] uppercase tracking-[0.2em] hover:bg-white hover:text-black transition-all duration-300">
        Смотреть каталог
    </a>
</section>

<!-- Новинки -->
<section class="max-w-[1400px] mx-auto px-6 pb-20">
    <div class="flex items-center justify-between mb-8">
        <h2 class="text-white text-[13px] uppercase tracking-[0.25em] font-medium">Новинки</h2>
        <a href="/catalog?sort=createdAt" class="text-white/40 text-[12px] uppercase tracking-[0.15em] hover:text-white transition">Все →</a>
    </div>
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
        <a th:each="p : ${newest}" th:href="@{'/product/' + ${p.id}}" class="group block">
            <div class="aspect-[3/4] bg-[#161616] overflow-hidden relative">
                <img th:if="${p.hasImage}" th:src="@{'/product/' + ${p.id} + '/image'}" alt="" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500"/>
                <div th:unless="${p.hasImage}" class="w-full h-full flex items-center justify-center">
                    <i class="fas fa-image text-white/10 text-4xl"></i>
                </div>
                <!-- Градиентный оверлей -->
                <div class="absolute inset-0 bg-gradient-to-t from-black/85 via-black/10 to-transparent"></div>
                <!-- Информация поверх фото -->
                <div class="absolute bottom-0 left-0 right-0 p-4 translate-y-1 group-hover:translate-y-0 transition-transform duration-300">
                    <p class="text-white text-[13px] leading-snug line-clamp-2 mb-2" th:text="${p.title}"></p>
                    <p class="text-white text-[15px] font-semibold" th:text="${p.price} + ' ₽'"></p>
                </div>
            </div>
        </a>
    </div>
</section>

<!-- Популярные -->
<section class="max-w-[1400px] mx-auto px-6 pb-24">
    <div class="flex items-center justify-between mb-8">
        <h2 class="text-white text-[13px] uppercase tracking-[0.25em] font-medium">Популярные</h2>
        <a href="/catalog" class="text-white/40 text-[12px] uppercase tracking-[0.15em] hover:text-white transition">Все →</a>
    </div>
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
        <a th:each="p : ${popular}" th:href="@{'/product/' + ${p.id}}" class="group block">
            <div class="aspect-[3/4] bg-[#161616] overflow-hidden relative">
                <img th:if="${p.hasImage}" th:src="@{'/product/' + ${p.id} + '/image'}" alt="" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500"/>
                <div th:unless="${p.hasImage}" class="w-full h-full flex items-center justify-center">
                    <i class="fas fa-image text-white/10 text-4xl"></i>
                </div>
                <!-- Градиентный оверлей -->
                <div class="absolute inset-0 bg-gradient-to-t from-black/85 via-black/10 to-transparent"></div>
                <!-- Информация поверх фото -->
                <div class="absolute bottom-0 left-0 right-0 p-4 translate-y-1 group-hover:translate-y-0 transition-transform duration-300">
                    <p class="text-white text-[13px] leading-snug line-clamp-2 mb-2" th:text="${p.title}"></p>
                    <p class="text-white text-[15px] font-semibold" th:text="${p.price} + ' ₽'"></p>
                </div>
            </div>
        </a>
    </div>
</section>

</main>
<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
