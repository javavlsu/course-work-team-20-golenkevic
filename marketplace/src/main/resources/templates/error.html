<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ошибка — MARKETPLACE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #e5e5e5; }</style>
</head>
<body class="min-h-screen flex flex-col bg-[#0a0a0a]">
<div th:replace="~{fragments/header :: header}"></div>
<main class="flex-1 pt-16 flex items-center justify-center px-6">
    <div class="text-center max-w-md">
        <p class="text-white text-[88px] font-light tracking-tight mb-2" th:text="${status ?: 500}">500</p>
        <p class="text-white/70 text-[15px] uppercase tracking-[0.3em] mb-3">Что-то пошло не так</p>
        <p class="text-white/40 text-[14px] mb-10" th:text="${message ?: 'Произошла непредвиденная ошибка'}">Произошла непредвиденная ошибка</p>
        <div class="flex flex-col sm:flex-row gap-3 justify-center">
            <a href="/" class="px-6 py-3 bg-white text-black text-[12px] uppercase tracking-[0.2em] hover:bg-white/90 transition">
                На главную
            </a>
            <a href="/catalog" class="px-6 py-3 border border-white/20 text-white/70 text-[12px] uppercase tracking-[0.2em] hover:border-white/40 hover:text-white transition">
                В каталог
            </a>
        </div>
    </div>
</main>
<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
