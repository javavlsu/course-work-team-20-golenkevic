<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<header th:fragment="header" class="fixed top-0 left-0 right-0 z-50 bg-[#0a0a0a] border-b border-white/10">
    <nav class="max-w-[1400px] mx-auto px-6 h-16 flex items-center justify-between">
        <!-- Left: burger + links -->
        <div class="flex items-center gap-8">
            <button id="burger-btn" class="lg:hidden text-white text-xl">
                <i class="fas fa-bars"></i>
            </button>
            <div class="hidden lg:flex items-center gap-6">
                <a href="/catalog" class="text-[13px] text-white/70 hover:text-white uppercase tracking-[0.15em] transition">Каталог</a>
                <span sec:authorize="hasAnyAuthority('ROLE_seller','ROLE_admin')">
                    <a href="/seller/products" class="text-[13px] text-white/70 hover:text-white uppercase tracking-[0.15em] transition">Мои товары</a>
                </span>
            </div>
        </div>

        <!-- Center: logo -->
        <a href="/" class="absolute left-1/2 -translate-x-1/2 text-white text-[18px] font-semibold tracking-[0.3em] uppercase">
            MARKETPLACE
        </a>

        <!-- Right: icons -->
        <div class="flex items-center gap-5">
            <div sec:authorize="isAuthenticated()" class="flex items-center gap-5">
                <a href="/cart" class="text-white/70 hover:text-white transition" title="Корзина">
                    <i class="fas fa-shopping-bag text-[17px]"></i>
                </a>
                <a href="/profile" class="text-white/70 hover:text-white transition" title="Профиль">
                    <i class="fas fa-user text-[17px]"></i>
                </a>
                <span sec:authorize="hasAnyAuthority('ROLE_moderator','ROLE_admin')">
                    <a href="/moderation" class="text-white/70 hover:text-white transition" title="Модерация">
                        <i class="fas fa-shield-alt text-[17px]"></i>
                    </a>
                </span>
                <span sec:authorize="hasAuthority('ROLE_admin')">
                    <a href="/admin/dashboard" class="text-white/70 hover:text-white transition" title="Админ">
                        <i class="fas fa-sliders-h text-[17px]"></i>
                    </a>
                </span>
                <form th:action="@{/profile/logout}" method="post" class="inline">
                    <button type="submit" class="text-white/30 hover:text-red-400 transition" title="Выйти">
                        <i class="fas fa-sign-out-alt text-[15px]"></i>
                    </button>
                </form>
            </div>
            <div sec:authorize="isAnonymous()">
                <a href="/auth" class="text-[13px] text-white/70 hover:text-white uppercase tracking-[0.15em] transition">Войти</a>
            </div>
        </div>
    </nav>

    <!-- Mobile menu -->
    <div id="mobile-menu" class="hidden lg:hidden bg-[#0a0a0a] border-t border-white/10 px-6 py-4 space-y-3">
        <a href="/catalog" class="block text-[13px] text-white/70 hover:text-white uppercase tracking-[0.15em]">Каталог</a>
        <span sec:authorize="hasAnyAuthority('ROLE_seller','ROLE_admin')">
            <a href="/seller/products" class="block text-[13px] text-white/70 hover:text-white uppercase tracking-[0.15em]">Мои товары</a>
        </span>
        <span sec:authorize="hasAnyAuthority('ROLE_moderator','ROLE_admin')">
            <a href="/moderation" class="block text-[13px] text-white/70 hover:text-white uppercase tracking-[0.15em]">Модерация</a>
        </span>
    </div>

    <script>
        document.getElementById('burger-btn')?.addEventListener('click', function() {
            document.getElementById('mobile-menu').classList.toggle('hidden');
        });
    </script>
</header>
</html>
