<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<header th:fragment="header" class="bg-white shadow-sm border-b">
    <nav class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
        <a href="/" class="text-xl font-bold text-indigo-600">
            <i class="fas fa-store"></i> Маркетплейс
        </a>
        <div class="flex items-center gap-6">
            <a href="/" class="text-gray-600 hover:text-indigo-600">Главная</a>
            <a href="/catalog" class="text-gray-600 hover:text-indigo-600">Каталог</a>
            <div sec:authorize="isAuthenticated()">
                <a href="/cart" class="text-gray-600 hover:text-indigo-600"><i class="fas fa-shopping-cart"></i> Корзина</a>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <div sec:authorize="isAnonymous()">
                <a href="/auth" class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700">Войти</a>
            </div>
            <div sec:authorize="isAuthenticated()" class="flex items-center gap-3">
                <a href="/profile" class="text-gray-600 hover:text-indigo-600"><i class="fas fa-user"></i> Профиль</a>
                <span sec:authorize="hasAuthority('ROLE_seller')">
                    <a href="/seller/products" class="text-gray-600 hover:text-indigo-600"><i class="fas fa-box"></i> Мои товары</a>
                </span>
                <span sec:authorize="hasAuthority('ROLE_moderator')">
                    <a href="/moderation" class="text-gray-600 hover:text-indigo-600"><i class="fas fa-shield-alt"></i> Модерация</a>
                </span>
                <span sec:authorize="hasAuthority('ROLE_admin')">
                    <a href="/admin/dashboard" class="text-gray-600 hover:text-indigo-600"><i class="fas fa-cog"></i> Админ</a>
                </span>
                <form th:action="@{/profile/logout}" method="post" class="inline">
                    <button type="submit" class="text-gray-400 hover:text-red-500"><i class="fas fa-sign-out-alt"></i></button>
                </form>
            </div>
        </div>
    </nav>
</header>
</html>
