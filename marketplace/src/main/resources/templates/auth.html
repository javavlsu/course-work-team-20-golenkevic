<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARKETPLACE — Вход</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #e5e5e5; }</style>
</head>
<body class="min-h-screen flex flex-col bg-[#0a0a0a]">
<div th:replace="~{fragments/header :: header}"></div>
<main class="flex-1 pt-16">

<section class="min-h-[80vh] flex items-center justify-center px-6">
    <div class="w-full max-w-md">
        <h1 class="text-white text-[28px] font-light tracking-[0.15em] uppercase text-center mb-12">Аккаунт</h1>
        <div class="flex border-b border-white/10 mb-10">
            <button onclick="showTab('login')" id="tab-login" class="flex-1 pb-3 text-[13px] uppercase tracking-[0.2em] text-white border-b-2 border-white transition">Вход</button>
            <button onclick="showTab('register')" id="tab-register" class="flex-1 pb-3 text-[13px] uppercase tracking-[0.2em] text-white/40 border-b-2 border-transparent hover:text-white/60 transition">Регистрация</button>
        </div>
        <div th:if="${param.error}" class="bg-red-500/10 border border-red-500/20 text-red-400 text-[13px] px-4 py-3 mb-6">Неверные данные для входа</div>
        <div th:if="${param.success}" class="bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 text-[13px] px-4 py-3 mb-6">Регистрация успешна</div>
        <div th:if="${error}" class="bg-red-500/10 border border-red-500/20 text-red-400 text-[13px] px-4 py-3 mb-6" th:text="${error}"></div>
        <form id="form-login" th:action="@{/auth/login}" method="post" class="space-y-6">
            <div>
                <label class="block text-white/40 text-[11px] uppercase tracking-[0.2em] mb-2">Email или имя</label>
                <input type="text" name="username" required class="w-full bg-transparent border-b border-white/20 text-white text-[15px] py-2.5 focus:border-white outline-none transition">
            </div>
            <div>
                <label class="block text-white/40 text-[11px] uppercase tracking-[0.2em] mb-2">Пароль</label>
                <input type="password" name="password" required class="w-full bg-transparent border-b border-white/20 text-white text-[15px] py-2.5 focus:border-white outline-none transition">
            </div>
            <div class="flex items-center gap-2">
                <input type="checkbox" name="remember-me" id="remember" class="accent-white">
                <label for="remember" class="text-white/40 text-[12px]">Запомнить</label>
            </div>
            <button type="submit" class="w-full py-3.5 bg-white text-black text-[13px] uppercase tracking-[0.2em] font-medium hover:bg-white/90 transition">Войти</button>
        </form>
        <form id="form-register" th:action="@{/auth/register}" method="post" class="space-y-6 hidden">
            <div>
                <label class="block text-white/40 text-[11px] uppercase tracking-[0.2em] mb-2">Имя пользователя</label>
                <input type="text" name="username" required maxlength="50" class="w-full bg-transparent border-b border-white/20 text-white text-[15px] py-2.5 focus:border-white outline-none transition">
            </div>
            <div>
                <label class="block text-white/40 text-[11px] uppercase tracking-[0.2em] mb-2">Email</label>
                <input type="email" name="email" required class="w-full bg-transparent border-b border-white/20 text-white text-[15px] py-2.5 focus:border-white outline-none transition">
            </div>
            <div>
                <label class="block text-white/40 text-[11px] uppercase tracking-[0.2em] mb-2">Пароль</label>
                <input type="password" name="password" required minlength="6" class="w-full bg-transparent border-b border-white/20 text-white text-[15px] py-2.5 focus:border-white outline-none transition">
            </div>
            <div>
                <label class="block text-white/40 text-[11px] uppercase tracking-[0.2em] mb-2">Подтвердите пароль</label>
                <input type="password" name="confirmPassword" required class="w-full bg-transparent border-b border-white/20 text-white text-[15px] py-2.5 focus:border-white outline-none transition">
            </div>
            <button type="submit" class="w-full py-3.5 bg-white text-black text-[13px] uppercase tracking-[0.2em] font-medium hover:bg-white/90 transition">Зарегистрироваться</button>
        </form>
    </div>
</section>
<script>
function showTab(t){document.getElementById('form-login').classList.toggle('hidden',t!=='login');document.getElementById('form-register').classList.toggle('hidden',t!=='register');document.getElementById('tab-login').className='flex-1 pb-3 text-[13px] uppercase tracking-[0.2em] transition '+(t==='login'?'text-white border-b-2 border-white':'text-white/40 border-b-2 border-transparent');document.getElementById('tab-register').className='flex-1 pb-3 text-[13px] uppercase tracking-[0.2em] transition '+(t==='register'?'text-white border-b-2 border-white':'text-white/40 border-b-2 border-transparent');}
</script>
</main>
<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
