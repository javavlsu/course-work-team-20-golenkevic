<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:replace="~{layout :: layout(~{::section})}">
<section class="max-w-4xl mx-auto px-4 py-12">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
        <!-- Вход -->
        <div class="bg-white p-8 rounded-xl shadow-sm">
            <h2 class="text-2xl font-bold text-gray-800 mb-6">Вход</h2>
            <div th:if="${param.error}" class="bg-red-50 text-red-600 p-3 rounded-lg mb-4">Неверные данные</div>
            <div th:if="${param.success}" class="bg-green-50 text-green-600 p-3 rounded-lg mb-4" th:text="${success}">Успех</div>
            <form th:action="@{/auth/login}" method="post">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Email или имя</label>
                    <input type="text" name="username" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500">
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Пароль</label>
                    <input type="password" name="password" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500">
                </div>
                <div class="mb-4 flex items-center">
                    <input type="checkbox" name="remember-me" id="remember" class="mr-2">
                    <label for="remember" class="text-sm text-gray-600">Запомнить меня</label>
                </div>
                <button type="submit" class="w-full bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700">Войти</button>
            </form>
        </div>
        <!-- Регистрация -->
        <div class="bg-white p-8 rounded-xl shadow-sm">
            <h2 class="text-2xl font-bold text-gray-800 mb-6">Регистрация</h2>
            <div th:if="${error}" class="bg-red-50 text-red-600 p-3 rounded-lg mb-4" th:text="${error}"></div>
            <form th:action="@{/auth/register}" method="post">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Имя пользователя</label>
                    <input type="text" name="username" required maxlength="50" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500">
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                    <input type="email" name="email" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500">
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Пароль</label>
                    <input type="password" name="password" required minlength="6" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500">
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Подтверждение пароля</label>
                    <input type="password" name="confirmPassword" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500">
                </div>
                <button type="submit" class="w-full bg-emerald-600 text-white py-2 rounded-lg hover:bg-emerald-700">Зарегистрироваться</button>
            </form>
        </div>
    </div>
</section>
</div>
</body>
</html>
