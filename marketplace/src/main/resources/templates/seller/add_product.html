<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARKETPLACE — Добавить товар</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #e5e5e5; }</style>
</head>
<body class="min-h-screen flex flex-col bg-[#0a0a0a]">
<div th:replace="~{fragments/header :: header}"></div>
<main class="flex-1 pt-16">
<div class="max-w-[1000px] mx-auto px-6 py-12">

    <!-- Хлебные крошки -->
    <nav class="flex items-center gap-2 text-[11px] uppercase tracking-[0.15em] text-white/25 mb-10">
        <a href="/seller/products" class="hover:text-white/50 transition">Мои товары</a>
        <span>/</span>
        <span class="text-white/50">Добавить</span>
    </nav>

    <h1 class="text-white text-[13px] uppercase tracking-[0.25em] font-medium mb-10">Новый товар</h1>

    <div class="grid grid-cols-1 lg:grid-cols-[1fr_300px] gap-10 items-start">

        <!-- Форма -->
        <form th:action="@{/seller/products/new}" method="post" enctype="multipart/form-data" class="space-y-6">

            <div class="bg-[#111] border border-white/8 p-7 space-y-6">
                <p class="text-white/30 text-[10px] uppercase tracking-[0.25em]">Основная информация</p>

                <div>
                    <label for="title" class="block text-white/35 text-[10px] uppercase tracking-[0.2em] mb-2">Название *</label>
                    <input id="title" type="text" name="title" required maxlength="200"
                           oninput="updatePreview(this.value)"
                           class="w-full bg-[#1a1a1a] border border-white/10 text-white text-[14px] px-4 py-3 focus:border-white/35 outline-none transition placeholder:text-white/20"
                           placeholder="Название товара">
                </div>

                <div>
                    <label for="description" class="block text-white/35 text-[10px] uppercase tracking-[0.2em] mb-2">Описание</label>
                    <textarea id="description" name="description" rows="4"
                              class="w-full bg-[#1a1a1a] border border-white/10 text-white text-[13px] px-4 py-3 focus:border-white/35 outline-none transition resize-none placeholder:text-white/20"
                              placeholder="Подробное описание товара: состояние, размер, история..."></textarea>
                </div>
            </div>

            <div class="bg-[#111] border border-white/8 p-7 space-y-6">
                <p class="text-white/30 text-[10px] uppercase tracking-[0.25em]">Детали</p>

                <div class="grid grid-cols-2 gap-5">
                    <div>
                        <label for="price" class="block text-white/35 text-[10px] uppercase tracking-[0.2em] mb-2">Цена (₽) *</label>
                        <input id="price" type="number" name="price" step="0.01" required min="0"
                               oninput="updatePrice(this.value)"
                               class="w-full bg-[#1a1a1a] border border-white/10 text-white text-[14px] px-4 py-3 focus:border-white/35 outline-none transition"
                               placeholder="0">
                    </div>
                    <div>
                        <label for="condition" class="block text-white/35 text-[10px] uppercase tracking-[0.2em] mb-2">Состояние *</label>
                        <select id="condition" name="condition" required
                                class="w-full bg-[#1a1a1a] border border-white/10 text-white/70 text-[13px] px-4 py-3 focus:border-white/35 outline-none transition">
                            <option th:each="c : ${conditions}" th:value="${c}" th:text="${c}"></option>
                        </select>
                    </div>
                </div>

                <div>
                    <label for="categoryId" class="block text-white/35 text-[10px] uppercase tracking-[0.2em] mb-2">Категория</label>
                    <select id="categoryId" name="categoryId"
                            class="w-full bg-[#1a1a1a] border border-white/10 text-white/70 text-[13px] px-4 py-3 focus:border-white/35 outline-none transition">
                        <option value="">Без категории</option>
                        <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
                    </select>
                </div>
            </div>

            <div class="bg-[#111] border border-white/8 p-7">
                <p class="text-white/30 text-[10px] uppercase tracking-[0.25em] mb-5">Фотография</p>
                <label class="block cursor-pointer">
                    <div id="drop-zone"
                         class="border-2 border-dashed border-white/10 p-10 text-center hover:border-white/25 transition">
                        <i class="fas fa-cloud-upload-alt text-white/20 text-3xl mb-3"></i>
                        <p class="text-white/30 text-[12px] uppercase tracking-[0.15em] mb-1">Нажмите или перетащите</p>
                        <p class="text-white/20 text-[11px]">JPG, PNG, WEBP — до 5 МБ</p>
                    </div>
                    <input type="file" name="image" accept="image/*" class="hidden" onchange="previewImage(this)">
                </label>
            </div>

            <button type="submit"
                    class="w-full py-4 bg-white text-black text-[12px] uppercase tracking-[0.25em] font-medium hover:bg-white/90 transition">
                Разместить товар
            </button>
            <p class="text-center text-white/20 text-[11px]">Товар будет опубликован после проверки модератором</p>
        </form>

        <!-- Превью -->
        <div class="lg:sticky lg:top-24">
            <p class="text-white/25 text-[10px] uppercase tracking-[0.2em] mb-4">Предпросмотр карточки</p>
            <div class="aspect-[3/4] bg-[#161616] overflow-hidden relative">
                <img id="preview-img" src="" alt="" class="w-full h-full object-cover hidden"/>
                <div id="preview-placeholder" class="w-full h-full flex flex-col items-center justify-center gap-3">
                    <i class="fas fa-image text-white/8 text-5xl"></i>
                    <p class="text-white/15 text-[11px] uppercase tracking-[0.15em]">Фото появится здесь</p>
                </div>
                <div class="absolute inset-0 bg-gradient-to-t from-black/85 via-black/10 to-transparent"></div>
                <div class="absolute bottom-0 left-0 right-0 p-4">
                    <p id="preview-title" class="text-white/40 text-[13px] mb-2">Название товара</p>
                    <p id="preview-price" class="text-white text-[15px] font-semibold">— ₽</p>
                </div>
            </div>
        </div>
    </div>
</div>
</main>

<script>
    function updatePreview(val) {
        document.getElementById('preview-title').textContent = val || 'Название товара';
    }
    function updatePrice(val) {
        document.getElementById('preview-price').textContent = val ? val + ' ₽' : '— ₽';
    }
    function previewImage(input) {
        if (!input.files[0]) return;
        const reader = new FileReader();
        reader.onload = e => {
            const img = document.getElementById('preview-img');
            img.src = e.target.result;
            img.classList.remove('hidden');
            document.getElementById('preview-placeholder').classList.add('hidden');
        };
        reader.readAsDataURL(input.files[0]);
    }
</script>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
