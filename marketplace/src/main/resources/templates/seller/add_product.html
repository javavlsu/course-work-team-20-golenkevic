<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARKETPLACE — Добавить товар</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #e5e5e5; }</style>
</head>
<body class="min-h-screen flex flex-col bg-[#0a0a0a]">
<div th:replace="~{fragments/header :: header}"></div>
<main class="flex-1 pt-16">
<section class="max-w-[600px] mx-auto px-6 py-12">
    <h1 class="text-white text-[13px] uppercase tracking-[0.25em] font-medium mb-10">Добавить товар</h1>
    <form th:action="@{/seller/products/new}" method="post" enctype="multipart/form-data" class="space-y-6">
        <div>
            <label class="block text-white/40 text-[11px] uppercase tracking-[0.2em] mb-2">Название</label>
            <input type="text" name="title" required maxlength="200" class="w-full bg-transparent border-b border-white/20 text-white text-[15px] py-2.5 focus:border-white outline-none transition">
        </div>
        <div>
            <label class="block text-white/40 text-[11px] uppercase tracking-[0.2em] mb-2">Описание</label>
            <textarea name="description" rows="4" class="w-full bg-transparent border border-white/15 text-white text-[14px] px-4 py-3 focus:border-white/30 outline-none transition resize-none"></textarea>
        </div>
        <div class="grid grid-cols-2 gap-6">
            <div>
                <label class="block text-white/40 text-[11px] uppercase tracking-[0.2em] mb-2">Цена (₽)</label>
                <input type="number" name="price" step="0.01" required class="w-full bg-transparent border-b border-white/20 text-white text-[15px] py-2.5 focus:border-white outline-none transition">
            </div>
            <div>
                <label class="block text-white/40 text-[11px] uppercase tracking-[0.2em] mb-2">Состояние</label>
                <select name="condition" required class="w-full bg-[#0a0a0a] border border-white/15 text-white/70 text-[13px] px-4 py-2.5">
                    <option th:each="c : ${conditions}" th:value="${c}" th:text="${c}"></option>
                </select>
            </div>
        </div>
        <div>
            <label class="block text-white/40 text-[11px] uppercase tracking-[0.2em] mb-2">Категория</label>
            <select name="categoryId" class="w-full bg-[#0a0a0a] border border-white/15 text-white/70 text-[13px] px-4 py-2.5">
                <option value="">Без категории</option>
                <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
            </select>
        </div>
        <div>
            <label class="block text-white/40 text-[11px] uppercase tracking-[0.2em] mb-2">Фотография</label>
            <input type="file" name="image" accept="image/*" class="w-full text-white/50 text-[13px] file:mr-4 file:py-2 file:px-4 file:border file:border-white/20 file:text-white/70 file:bg-transparent file:text-[12px] file:uppercase file:tracking-wider hover:file:border-white/40 file:transition file:cursor-pointer">
        </div>
        <button type="submit" class="w-full py-3.5 bg-white text-black text-[13px] uppercase tracking-[0.2em] font-medium hover:bg-white/90 transition">Разместить товар</button>
    </form>
</section>
</main>
<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
