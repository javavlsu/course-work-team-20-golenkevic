<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARKETPLACE — Мои товары</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #e5e5e5; }</style>
</head>
<body class="min-h-screen flex flex-col bg-[#0a0a0a]">
<div th:replace="~{fragments/header :: header}"></div>
<main class="flex-1 pt-16">
<section class="max-w-[900px] mx-auto px-6 py-12">
    <div class="flex justify-between items-center mb-10">
        <h1 class="text-white text-[13px] uppercase tracking-[0.25em] font-medium">Мои товары</h1>
        <a href="/seller/products/new" class="px-6 py-2.5 bg-white text-black text-[12px] uppercase tracking-[0.15em] hover:bg-white/90 transition">Добавить товар</a>
    </div>
    <div th:unless="${#lists.isEmpty(pending)}" class="mb-8">
        <p class="text-yellow-400/70 text-[11px] uppercase tracking-[0.2em] mb-4">На модерации</p>
        <div th:each="p : ${pending}" class="border border-yellow-500/10 bg-yellow-500/[0.03] p-4 mb-2 flex justify-between items-center">
            <span class="text-white/70 text-[13px]" th:text="${p.title}"></span>
            <span class="text-yellow-400/50 text-[11px] uppercase tracking-wider">Ожидает</span>
        </div>
    </div>
    <div th:unless="${#lists.isEmpty(approved)}" class="mb-8">
        <p class="text-emerald-400/70 text-[11px] uppercase tracking-[0.2em] mb-4">Опубликованные</p>
        <div th:each="p : ${approved}" class="border border-white/10 p-4 mb-2 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <a th:href="@{'/product/' + ${p.id}}" class="text-white/80 text-[13px] hover:text-white transition" th:text="${p.title}"></a>
                <span class="text-white/40 text-[13px]" th:text="${p.price} + ' ₽'"></span>
            </div>
            <div class="flex gap-2">
                <a th:href="@{'/seller/products/' + ${p.id} + '/edit'}" class="px-3 py-1 text-[11px] border border-white/10 text-white/40 hover:text-white hover:border-white/30 transition">Ред.</a>
                <form th:action="@{'/seller/products/' + ${p.id} + '/delete'}" method="post">
                    <button class="px-3 py-1 text-[11px] border border-white/10 text-white/40 hover:text-red-400 hover:border-red-400/30 transition">Удалить</button>
                </form>
            </div>
        </div>
    </div>
    <div th:unless="${#lists.isEmpty(rejected)}">
        <p class="text-red-400/70 text-[11px] uppercase tracking-[0.2em] mb-4">Отклонённые</p>
        <div th:each="p : ${rejected}" class="border border-red-500/10 bg-red-500/[0.03] p-4 mb-2">
            <span class="text-white/50 text-[13px]" th:text="${p.title}"></span>
        </div>
    </div>
</section>
</main>
<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
