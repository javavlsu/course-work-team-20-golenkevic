<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARKETPLACE — Заказы</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #e5e5e5; }</style>
</head>
<body class="min-h-screen flex flex-col bg-[#0a0a0a]">
<div th:replace="~{fragments/header :: header}"></div>
<main class="flex-1 pt-16">
<section class="max-w-[900px] mx-auto px-6 py-12">
    <h1 class="text-white text-[13px] uppercase tracking-[0.25em] font-medium mb-10">Заказы на мои товары</h1>
    <div th:each="order : ${orders}" class="border border-white/10 p-6 mb-4">
        <div class="flex justify-between items-center mb-3">
            <span class="text-white/80 text-[14px]">Заказ #<span th:text="${order.id}"></span></span>
            <span class="text-[11px] uppercase tracking-wider text-white/40" th:text="${order.status}"></span>
        </div>
        <p class="text-white/40 text-[13px]">Покупатель: <span class="text-white/70" th:text="${order.buyer.username}"></span></p>
        <p class="text-white/40 text-[13px]">Адрес: <span class="text-white/70" th:text="${order.deliveryAddress}"></span></p>
        <div class="mt-3 pt-3 border-t border-white/5 space-y-1">
            <div th:each="item : ${order.items}" class="text-white/50 text-[13px]">
                <span th:text="${item.product.title}"></span> x<span th:text="${item.quantity}"></span>
            </div>
        </div>
    </div>
</section>
</main>
<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
