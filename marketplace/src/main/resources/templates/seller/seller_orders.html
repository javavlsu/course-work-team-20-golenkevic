<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARKETPLACE — Заказы продавца</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #e5e5e5; }
        details summary { list-style: none; cursor: pointer; }
        details summary::-webkit-details-marker { display: none; }
        details[open] .accordion-chevron { transform: rotate(180deg); }
        .accordion-chevron { transition: transform 0.25s ease; }
    </style>
</head>
<body class="min-h-screen flex flex-col bg-[#0a0a0a]">
<div th:replace="~{fragments/header :: header}"></div>
<main class="flex-1 pt-16">
<div class="max-w-[1100px] mx-auto px-6 py-12">

    <!-- Хлебные крошки -->
    <nav class="flex items-center gap-2 text-[11px] uppercase tracking-[0.15em] text-white/25 mb-6">
        <a href="/seller/products" class="hover:text-white/50 transition">Мои товары</a>
        <span>/</span>
        <span class="text-white/50">Заказы</span>
    </nav>

    <!-- Заголовок -->
    <div class="flex items-end justify-between mb-10 pb-6 border-b border-white/10">
        <div>
            <p class="text-white/30 text-[10px] uppercase tracking-[0.3em] mb-2">Панель продавца</p>
            <h1 class="text-white text-[26px] font-light tracking-wide">Заказы на мои товары</h1>
        </div>
        <span class="text-white/30 text-[12px]" th:text="'Всего: ' + ${#lists.size(orders)}"></span>
    </div>

    <!-- Пусто -->
    <div th:if="${#lists.isEmpty(orders)}" class="py-24 text-center">
        <i class="fas fa-inbox text-white/8 text-6xl mb-6"></i>
        <p class="text-white/30 text-[13px] uppercase tracking-[0.2em]">Заказов пока нет</p>
    </div>

    <!-- Список заказов -->
    <div class="space-y-4">
        <details th:each="order : ${orders}" class="bg-[#111] border border-white/8 hover:border-white/15 transition">

            <!-- Заголовок -->
            <summary class="p-6 flex flex-wrap items-center gap-4 justify-between">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-white/5 flex items-center justify-center">
                        <i class="fas fa-box text-white/40 text-[14px]"></i>
                    </div>
                    <div>
                        <p class="text-white/85 text-[14px] font-medium">
                            Заказ <span class="font-mono">#<span th:text="${order.id}"></span></span>
                        </p>
                        <p class="text-white/30 text-[11px] mt-0.5"
                           th:text="${#temporals.format(order.createdAt, 'dd MMM yyyy, HH:mm')}"></p>
                    </div>
                </div>

                <!-- Покупатель -->
                <div class="hidden sm:flex items-center gap-2 text-white/55 text-[13px]">
                    <i class="fas fa-user-circle text-white/25 text-[14px]"></i>
                    <span th:text="${order.buyer.username}"></span>
                </div>

                <div class="flex items-center gap-3">
                    <span class="text-[10px] uppercase tracking-[0.15em] px-3 py-1 border whitespace-nowrap"
                          th:classappend="${order.status.name() == 'NEW'}        ? 'bg-blue-400/10 text-blue-400 border-blue-400/20' :
                                          (${order.status.name() == 'CONFIRMED'}  ? 'bg-cyan-400/10 text-cyan-400 border-cyan-400/20' :
                                          (${order.status.name() == 'IN_DELIVERY'} ? 'bg-amber-400/10 text-amber-400 border-amber-400/20' :
                                          (${order.status.name() == 'DELIVERED'}   ? 'bg-purple-400/10 text-purple-400 border-purple-400/20' :
                                          (${order.status.name() == 'COMPLETED'}   ? 'bg-emerald-400/10 text-emerald-400 border-emerald-400/20' :
                                                                                    'bg-red-400/10 text-red-400 border-red-400/20'))))"
                          th:text="${order.status}"></span>
                    <i class="fas fa-chevron-down accordion-chevron text-white/30 text-[11px]"></i>
                </div>
            </summary>

            <!-- Подробности -->
            <div class="border-t border-white/8 p-6">

                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">

                    <!-- Левая: контакт -->
                    <div>
                        <p class="text-white/30 text-[10px] uppercase tracking-[0.2em] mb-4">Покупатель</p>
                        <div class="space-y-3">
                            <div class="flex items-start gap-3">
                                <i class="fas fa-user text-white/25 text-[12px] mt-1"></i>
                                <div>
                                    <p class="text-white/30 text-[10px] uppercase tracking-[0.15em]">Имя</p>
                                    <p class="text-white/80 text-[13px]" th:text="${order.contactName}"></p>
                                </div>
                            </div>
                            <div class="flex items-start gap-3">
                                <i class="fas fa-phone text-white/25 text-[12px] mt-1"></i>
                                <div>
                                    <p class="text-white/30 text-[10px] uppercase tracking-[0.15em]">Телефон</p>
                                    <p class="text-white/80 text-[13px]" th:text="${order.contactPhone}"></p>
                                </div>
                            </div>
                            <div class="flex items-start gap-3">
                                <i class="fas fa-map-marker-alt text-white/25 text-[12px] mt-1"></i>
                                <div>
                                    <p class="text-white/30 text-[10px] uppercase tracking-[0.15em]">Адрес</p>
                                    <p class="text-white/80 text-[13px] leading-relaxed" th:text="${order.deliveryAddress}"></p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Правая: товары -->
                    <div>
                        <p class="text-white/30 text-[10px] uppercase tracking-[0.2em] mb-4">Товары</p>
                        <div class="space-y-2">
                            <div th:each="item : ${order.items}"
                                 class="flex gap-3 items-center p-2 bg-white/[0.02]">
                                <div class="w-10 h-12 bg-[#1a1a1a] overflow-hidden flex-shrink-0">
                                    <img th:if="${item.product.imageData != null}"
                                         th:src="@{'/product/' + ${item.product.id} + '/image'}"
                                         alt="" class="w-full h-full object-cover"/>
                                    <div th:unless="${item.product.imageData != null}"
                                         class="w-full h-full flex items-center justify-center">
                                        <i class="fas fa-image text-white/15 text-[10px]"></i>
                                    </div>
                                </div>
                                <div class="flex-1 min-w-0">
                                    <p class="text-white/75 text-[12px] truncate" th:text="${item.product.title}"></p>
                                    <p class="text-white/35 text-[11px]"
                                       th:text="${item.quantity} + ' × ' + ${item.price} + ' ₽'"></p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Действия: смена статуса -->
                <div class="mt-8 pt-6 border-t border-white/8"
                     th:unless="${order.status.name() == 'COMPLETED' or order.status.name() == 'CANCELLED'}">
                    <p class="text-white/30 text-[10px] uppercase tracking-[0.2em] mb-3">Изменить статус</p>
                    <div class="flex flex-wrap gap-2">
                        <form th:if="${order.status.name() == 'NEW'}"
                              th:action="@{'/seller/orders/' + ${order.id} + '/status'}" method="post">
                            <input type="hidden" name="status" value="CONFIRMED"/>
                            <button class="px-4 py-2 bg-cyan-400/15 border border-cyan-400/30 text-cyan-400 text-[11px] uppercase tracking-[0.15em] hover:bg-cyan-400/25 transition flex items-center gap-2">
                                <i class="fas fa-check text-[10px]"></i> Подтвердить
                            </button>
                        </form>
                        <form th:if="${order.status.name() == 'CONFIRMED'}"
                              th:action="@{'/seller/orders/' + ${order.id} + '/status'}" method="post">
                            <input type="hidden" name="status" value="IN_DELIVERY"/>
                            <button class="px-4 py-2 bg-amber-400/15 border border-amber-400/30 text-amber-400 text-[11px] uppercase tracking-[0.15em] hover:bg-amber-400/25 transition flex items-center gap-2">
                                <i class="fas fa-truck text-[10px]"></i> Передать в доставку
                            </button>
                        </form>
                        <form th:if="${order.status.name() == 'IN_DELIVERY'}"
                              th:action="@{'/seller/orders/' + ${order.id} + '/status'}" method="post">
                            <input type="hidden" name="status" value="DELIVERED"/>
                            <button class="px-4 py-2 bg-purple-400/15 border border-purple-400/30 text-purple-400 text-[11px] uppercase tracking-[0.15em] hover:bg-purple-400/25 transition flex items-center gap-2">
                                <i class="fas fa-box-open text-[10px]"></i> Отметить доставленным
                            </button>
                        </form>
                        <form th:if="${order.status.name() == 'DELIVERED'}"
                              th:action="@{'/seller/orders/' + ${order.id} + '/status'}" method="post">
                            <input type="hidden" name="status" value="COMPLETED"/>
                            <button class="px-4 py-2 bg-emerald-400/15 border border-emerald-400/30 text-emerald-400 text-[11px] uppercase tracking-[0.15em] hover:bg-emerald-400/25 transition flex items-center gap-2">
                                <i class="fas fa-check-double text-[10px]"></i> Завершить
                            </button>
                        </form>
                        <form th:if="${order.status.name() == 'NEW' or order.status.name() == 'CONFIRMED'}"
                              th:action="@{'/seller/orders/' + ${order.id} + '/status'}" method="post">
                            <input type="hidden" name="status" value="CANCELLED"/>
                            <button class="px-4 py-2 border border-red-400/20 text-red-400/70 text-[11px] uppercase tracking-[0.15em] hover:bg-red-400/8 hover:border-red-400/40 transition flex items-center gap-2">
                                <i class="fas fa-times text-[10px]"></i> Отменить
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </details>
    </div>

</div>
</main>
<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
