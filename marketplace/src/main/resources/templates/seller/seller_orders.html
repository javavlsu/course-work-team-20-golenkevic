<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Маркетплейс товаров</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700\&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">
<div th:replace="~{fragments/header :: header}"></div>
<main class="flex-1">
<section class="max-w-5xl mx-auto px-4 py-8">
    <h1 class="text-3xl font-bold text-gray-800 mb-6">Заказы на мои товары</h1>
    <div th:each="order : ${orders}" class="bg-white rounded-xl shadow-sm p-6 mb-4">
        <div class="flex justify-between items-center mb-3">
            <span class="font-semibold">Заказ #<span th:text="${order.id}"></span></span>
            <span class="text-sm text-gray-500" th:text="${order.status}"></span>
        </div>
        <p class="text-sm text-gray-500">Покупатель: <span th:text="${order.buyer.username}"></span></p>
        <p class="text-sm text-gray-500">Адрес: <span th:text="${order.deliveryAddress}"></span></p>
        <div class="mt-2">
            <div th:each="item : ${order.items}" class="text-sm text-gray-600">
                <span th:text="${item.product.title}"></span> x<span th:text="${item.quantity}"></span>
            </div>
        </div>
    </div>
</section>
</main>
<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
