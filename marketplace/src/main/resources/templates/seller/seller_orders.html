<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:replace="~{layout :: layout(~{::section})}">
<section class="max-w-5xl mx-auto px-4 py-8">
    <h1 class="text-3xl font-bold text-gray-800 mb-6">Заказы на мои товары</h1>
    <div th:each="order : ${orders}" class="bg-white rounded-xl shadow-sm p-6 mb-4">
        <div class="flex justify-between items-center mb-3">
            <span class="font-semibold">Заказ #<span th:text="${order.id}"></span></span>
            <span class="text-sm text-gray-500" th:text="${order.status}"></span>
        </div>
        <p class="text-sm text-gray-500">Покупатель: <span th:text="${order.buyer.username}"></span></p>
        <p class="text-sm text-gray-500">Адрес: <span th:text="${order.deliveryAddress}"></span></p>
        <div class="mt-2">
            <div th:each="item : ${order.items}" class="text-sm text-gray-600">
                <span th:text="${item.product.title}"></span> x<span th:text="${item.quantity}"></span>
            </div>
        </div>
    </div>
</section>
</div>
</body>
</html>
