<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARKETPLACE — Редактировать товар</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #e5e5e5; }</style>
</head>
<body class="min-h-screen flex flex-col bg-[#0a0a0a]">
<div th:replace="~{fragments/header :: header}"></div>
<main class="flex-1 pt-16">
<div class="max-w-[1000px] mx-auto px-6 py-12">

    <!-- Хлебные крошки -->
    <nav class="flex items-center gap-2 text-[11px] uppercase tracking-[0.15em] text-white/25 mb-10">
        <a href="/seller/products" class="hover:text-white/50 transition">Мои товары</a>
        <span>/</span>
        <span class="text-white/50">Редактировать</span>
    </nav>

    <h1 class="text-white text-[13px] uppercase tracking-[0.25em] font-medium mb-10">Редактировать товар</h1>

    <div class="grid grid-cols-1 lg:grid-cols-[1fr_300px] gap-10 items-start">

        <!-- Форма -->
        <form th:action="@{'/seller/products/' + ${productId} + '/edit'}" method="post" enctype="multipart/form-data" class="space-y-6">

            <div class="bg-[#111] border border-white/8 p-7 space-y-6">
                <p class="text-white/30 text-[10px] uppercase tracking-[0.25em]">Основная информация</p>

                <div>
                    <label for="title" class="block text-white/35 text-[10px] uppercase tracking-[0.2em] mb-2">Название *</label>
                    <input id="title" type="text" name="title" th:value="${productDto.title}" required maxlength="200"
                           oninput="updatePreview(this.value)"
                           class="w-full bg-[#1a1a1a] border border-white/10 text-white text-[14px] px-4 py-3 focus:border-white/35 outline-none transition">
                </div>

                <div>
                    <label for="description" class="block text-white/35 text-[10px] uppercase tracking-[0.2em] mb-2">Описание</label>
                    <textarea id="description" name="description" rows="4"
                              th:text="${productDto.description}"
                              class="w-full bg-[#1a1a1a] border border-white/10 text-white text-[13px] px-4 py-3 focus:border-white/35 outline-none transition resize-none"></textarea>
                </div>
            </div>

            <div class="bg-[#111] border border-white/8 p-7 space-y-6">
                <p class="text-white/30 text-[10px] uppercase tracking-[0.25em]">Детали</p>

                <div class="grid grid-cols-2 gap-5">
                    <div>
                        <label for="price" class="block text-white/35 text-[10px] uppercase tracking-[0.2em] mb-2">Цена (₽) *</label>
                        <input id="price" type="number" name="price" step="0.01" required
                               th:value="${productDto.price}"
                               oninput="updatePrice(this.value)"
                               class="w-full bg-[#1a1a1a] border border-white/10 text-white text-[14px] px-4 py-3 focus:border-white/35 outline-none transition">
                    </div>
                    <div th:with="condLabels=${ {'NEW':'Новый','USED':'Б/у','VINTAGE':'Винтаж'} }">
                        <label for="condition" class="block text-white/35 text-[10px] uppercase tracking-[0.2em] mb-2">Состояние *</label>
                        <select id="condition" name="condition" required
                                class="w-full bg-[#1a1a1a] border border-white/10 text-white/70 text-[13px] px-4 py-3 focus:border-white/35 outline-none transition">
                            <option th:each="c : ${conditions}" th:value="${c}" th:text="${condLabels.get(c.name())}" th:selected="${c == productDto.condition}"></option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-5">
                    <div>
                        <label for="categoryId" class="block text-white/35 text-[10px] uppercase tracking-[0.2em] mb-2">Категория</label>
                        <select id="categoryId" name="categoryId"
                                class="w-full bg-[#1a1a1a] border border-white/10 text-white/70 text-[13px] px-4 py-3 focus:border-white/35 outline-none transition">
                            <option value="">Без категории</option>
                            <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"
                                    th:selected="${cat.id == productDto.categoryId}"></option>
                        </select>
                    </div>
                    <div>
                        <label for="brandId" class="block text-white/35 text-[10px] uppercase tracking-[0.2em] mb-2">Бренд</label>
                        <select id="brandId" name="brandId"
                                class="w-full bg-[#1a1a1a] border border-white/10 text-white/70 text-[13px] px-4 py-3 focus:border-white/35 outline-none transition">
                            <option value="">Без бренда</option>
                            <option th:each="br : ${brands}" th:value="${br.id}" th:text="${br.name}"
                                    th:selected="${br.id == productDto.brandId}"></option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-5">
                    <div th:with="genderLabels=${ {'MALE':'Мужской','FEMALE':'Женский','UNISEX':'Унисекс'} }">
                        <label for="gender" class="block text-white/35 text-[10px] uppercase tracking-[0.2em] mb-2">Пол</label>
                        <select id="gender" name="gender"
                                class="w-full bg-[#1a1a1a] border border-white/10 text-white/70 text-[13px] px-4 py-3 focus:border-white/35 outline-none transition">
                            <option value="">Не указан</option>
                            <option th:each="g : ${genders}" th:value="${g}" th:text="${genderLabels.get(g.name())}"
                                    th:selected="${g == productDto.gender}"></option>
                        </select>
                    </div>
                    <div th:with="seasonLabels=${ {'SUMMER':'Лето','WINTER':'Зима','DEMI':'Демисезон','UNIVERSAL':'Универсальный'} }">
                        <label for="season" class="block text-white/35 text-[10px] uppercase tracking-[0.2em] mb-2">Сезон</label>
                        <select id="season" name="season"
                                class="w-full bg-[#1a1a1a] border border-white/10 text-white/70 text-[13px] px-4 py-3 focus:border-white/35 outline-none transition">
                            <option value="">Не указан</option>
                            <option th:each="s : ${seasons}" th:value="${s}" th:text="${seasonLabels.get(s.name())}"
                                    th:selected="${s == productDto.season}"></option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-3 gap-5">
                    <div>
                        <label for="color" class="block text-white/35 text-[10px] uppercase tracking-[0.2em] mb-2">Цвет</label>
                        <input id="color" type="text" name="color" maxlength="50" th:value="${productDto.color}"
                               class="w-full bg-[#1a1a1a] border border-white/10 text-white text-[13px] px-4 py-3 focus:border-white/35 outline-none transition">
                    </div>
                    <div>
                        <label for="material" class="block text-white/35 text-[10px] uppercase tracking-[0.2em] mb-2">Материал</label>
                        <input id="material" type="text" name="material" maxlength="100" th:value="${productDto.material}"
                               class="w-full bg-[#1a1a1a] border border-white/10 text-white text-[13px] px-4 py-3 focus:border-white/35 outline-none transition">
                    </div>
                    <div>
                        <label for="size" class="block text-white/35 text-[10px] uppercase tracking-[0.2em] mb-2">Размер</label>
                        <input id="size" type="text" name="size" maxlength="30" th:value="${productDto.size}"
                               class="w-full bg-[#1a1a1a] border border-white/10 text-white text-[13px] px-4 py-3 focus:border-white/35 outline-none transition">
                    </div>
                </div>
            </div>

            <div class="bg-[#111] border border-white/8 p-7">
                <p class="text-white/30 text-[10px] uppercase tracking-[0.25em] mb-5">Фотографии</p>

                <!-- Существующие фото -->
                <div th:if="${hasImage or !#lists.isEmpty(extraImages)}"
                     class="mb-5 grid grid-cols-4 sm:grid-cols-6 gap-2">
                    <!-- Главное фото (imageData) -->
                    <div th:if="${hasImage}" class="relative aspect-square bg-[#1a1a1a] overflow-hidden group">
                        <img th:src="@{'/product/' + ${productId} + '/image'}" alt=""
                             class="w-full h-full object-cover"/>
                        <span class="absolute top-1 left-1 text-[9px] uppercase tracking-wider px-1.5 py-0.5 bg-white/20 backdrop-blur-sm text-white">Главное</span>
                    </div>
                    <!-- Дополнительные фото -->
                    <div th:each="img : ${extraImages}"
                         class="relative aspect-square bg-[#1a1a1a] overflow-hidden group">
                        <img th:src="@{'/product/' + ${productId} + '/image/' + ${img.id}}" alt=""
                             class="w-full h-full object-cover"/>
                        <div class="absolute inset-0 bg-black/70 opacity-0 group-hover:opacity-100 transition flex items-center justify-center">
                            <button type="button" aria-label="Удалить"
                                    th:onclick="'deleteImage(' + ${productId} + ', ' + ${img.id} + ', this)'"
                                    class="w-9 h-9 bg-red-500/90 text-white flex items-center justify-center hover:bg-red-500 transition">
                                <i class="fas fa-trash-alt text-[12px]"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                    <label class="block cursor-pointer">
                        <div class="border-2 border-dashed border-white/10 p-6 text-center hover:border-white/25 transition h-full">
                            <i class="fas fa-cloud-upload-alt text-white/20 text-2xl mb-2"></i>
                            <p class="text-white/40 text-[11px] uppercase tracking-[0.15em] mb-1">
                                <span th:text="${hasImage} ? 'Добавить' : 'Загрузить'">Загрузить</span>
                            </p>
                            <p class="text-white/20 text-[10px]">JPG, PNG, WEBP до 5 МБ</p>
                        </div>
                        <input type="file" name="images" accept="image/*" multiple class="hidden" onchange="previewImage(this)">
                    </label>
                    <button type="button" onclick="openGallery()"
                            class="border-2 border-dashed border-white/10 p-6 text-center hover:border-white/25 transition">
                        <i class="fas fa-images text-white/20 text-2xl mb-2"></i>
                        <p class="text-white/40 text-[11px] uppercase tracking-[0.15em] mb-1">Из библиотеки</p>
                        <p class="text-white/20 text-[10px]">Готовые фото</p>
                    </button>
                </div>

                <div id="gallery-selected-hidden"></div>
                <!-- Превью загружаемых -->
                <div id="upload-thumbs" class="mt-3 grid grid-cols-4 sm:grid-cols-6 gap-2 hidden"></div>
                <!-- Превью выбранных из библиотеки -->
                <div id="gallery-thumbs" class="mt-3 grid grid-cols-4 sm:grid-cols-6 gap-2 hidden"></div>
            </div>

            <div class="flex gap-3">
                <button type="submit"
                        class="flex-1 py-4 bg-white text-black text-[12px] uppercase tracking-[0.25em] font-medium hover:bg-white/90 transition">
                    Сохранить изменения
                </button>
                <a href="/seller/products"
                   class="px-6 py-4 border border-white/15 text-white/50 text-[12px] uppercase tracking-[0.15em] hover:border-white/35 hover:text-white/70 transition flex items-center">
                    Отмена
                </a>
            </div>
        </form>

        <!-- Превью -->
        <div class="lg:sticky lg:top-24">
            <p class="text-white/25 text-[10px] uppercase tracking-[0.2em] mb-4">Предпросмотр</p>
            <div class="aspect-[3/4] bg-[#161616] overflow-hidden relative">
                <img id="preview-new-img" src="" alt="" class="w-full h-full object-cover hidden"/>
                <img th:if="${hasImage}" id="preview-current-img"
                     th:src="@{'/product/' + ${productId} + '/image'}"
                     alt="" class="w-full h-full object-cover"/>
                <div th:unless="${hasImage}" id="preview-placeholder"
                     class="w-full h-full flex items-center justify-center">
                    <i class="fas fa-image text-white/8 text-5xl"></i>
                </div>
                <div class="absolute inset-0 bg-gradient-to-t from-black/85 via-black/10 to-transparent"></div>
                <div class="absolute bottom-0 left-0 right-0 p-4">
                    <p id="preview-title" class="text-white text-[13px] mb-2 line-clamp-2"
                       th:text="${productDto.title}">Название</p>
                    <p id="preview-price" class="text-white text-[15px] font-semibold"
                       th:text="${productDto.price} + ' ₽'">— ₽</p>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- ═══ МОДАЛКА ГАЛЕРЕИ ═══ -->
<div id="gallery-modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/70 backdrop-blur-sm p-4">
    <div class="bg-[#0f0f0f] border border-white/10 w-full max-w-4xl max-h-[90vh] flex flex-col">
        <div class="p-5 border-b border-white/10 flex items-center justify-between">
            <p class="text-white text-[14px] uppercase tracking-[0.2em]">Библиотека фото</p>
            <button type="button" onclick="closeGallery()" class="text-white/40 hover:text-white text-[18px]">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="flex border-b border-white/8">
            <button id="tab-local" type="button" onclick="switchSource('local')"
                    class="flex-1 py-3 text-[11px] uppercase tracking-[0.2em] border-b-2 border-white text-white">
                Локальная библиотека
            </button>
            <button id="tab-external" type="button" onclick="switchSource('external')"
                    class="flex-1 py-3 text-[11px] uppercase tracking-[0.2em] border-b-2 border-transparent text-white/35 hover:text-white/60 transition">
                <i class="fas fa-globe text-[10px] mr-1.5"></i>Поиск в интернете
            </button>
        </div>
        <div class="p-5 border-b border-white/8 flex flex-wrap gap-2">
            <input id="gallery-search" type="text" placeholder="Поиск..." oninput="loadGallery()"
                   class="flex-1 min-w-[180px] bg-[#1a1a1a] border border-white/10 text-white text-[13px] px-3 py-2 focus:border-white/30 outline-none transition placeholder:text-white/25">
            <select id="gallery-category" onchange="loadGallery()"
                    class="bg-[#1a1a1a] border border-white/10 text-white/70 text-[13px] px-3 py-2 focus:border-white/30 outline-none transition">
                <option value="">Все категории</option>
                <option value="clothes">Одежда</option>
                <option value="shoes">Обувь</option>
                <option value="bags">Сумки</option>
                <option value="accessories">Аксессуары</option>
                <option value="electronics">Электроника</option>
            </select>
        </div>
        <div id="gallery-grid" class="p-5 grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 gap-3 overflow-y-auto"></div>
        <div class="p-5 border-t border-white/10 flex items-center justify-between">
            <span class="text-white/40 text-[11px]"><span id="gallery-count">0</span> выбрано</span>
            <button type="button" onclick="closeGallery()"
                    class="px-6 py-2.5 bg-white text-black text-[11px] uppercase tracking-[0.15em] hover:bg-white/90 transition">
                Готово
            </button>
        </div>
    </div>
</div>

</main>

<script>
    const selectedGallery = new Set();
    const galleryPreviewMap = new Map();
    let gallerySource = 'local';

    function openGallery() {
        document.getElementById('gallery-modal').classList.remove('hidden');
        document.getElementById('gallery-modal').classList.add('flex');
        loadGallery();
    }
    function closeGallery() {
        document.getElementById('gallery-modal').classList.add('hidden');
        document.getElementById('gallery-modal').classList.remove('flex');
    }

    function switchSource(src) {
        gallerySource = src;
        const active = 'flex-1 py-3 text-[11px] uppercase tracking-[0.2em] border-b-2 border-white text-white';
        const inactive = 'flex-1 py-3 text-[11px] uppercase tracking-[0.2em] border-b-2 border-transparent text-white/35 hover:text-white/60 transition';
        document.getElementById('tab-local').className = src === 'local' ? active : inactive;
        document.getElementById('tab-external').className = src === 'external' ? active : inactive;
        document.getElementById('tab-external').innerHTML = '<i class="fas fa-globe text-[10px] mr-1.5"></i>Поиск в интернете';
        document.getElementById('gallery-search').placeholder = src === 'external' ? 'Например: shoes, phone, watch...' : 'Поиск...';
        loadGallery();
    }

    function loadGallery() {
        const search = document.getElementById('gallery-search').value;
        const category = document.getElementById('gallery-category').value;
        const url = gallerySource === 'external'
            ? `/api/gallery/external?query=${encodeURIComponent(search)}&category=${encodeURIComponent(category)}`
            : `/api/gallery?search=${encodeURIComponent(search)}&category=${encodeURIComponent(category)}`;
        const grid = document.getElementById('gallery-grid');
        grid.innerHTML = '<p class="col-span-full text-white/30 text-center text-[12px] py-8">Загрузка...</p>';
        fetch(url).then(r => r.json()).then(items => {
            grid.innerHTML = '';
            if (items.length === 0) {
                grid.innerHTML = gallerySource === 'external'
                    ? '<p class="col-span-full text-white/30 text-center text-[12px] py-8">Введите запрос или выберите категорию</p>'
                    : '<p class="col-span-full text-white/30 text-center text-[12px] py-8">Ничего не найдено</p>';
                return;
            }
            items.forEach(it => {
                const key = gallerySource === 'external' ? ('external:' + it.url) : it.path;
                const previewUrl = gallerySource === 'external' ? it.url : it.path;
                const label = gallerySource === 'external' ? (it.title || '') : it.filename;
                const selected = selectedGallery.has(key);
                const div = document.createElement('div');
                div.className = `relative aspect-square bg-[#1a1a1a] overflow-hidden cursor-pointer border-2 ${selected ? 'border-white/80' : 'border-transparent'} hover:border-white/40 transition`;
                div.innerHTML = `
                    <img src="${previewUrl}" alt="" class="w-full h-full object-cover"/>
                    <div class="absolute bottom-1 left-1 right-1 text-white/80 text-[10px] truncate bg-black/50 px-1.5 py-0.5">${label}</div>
                    ${selected ? '<div class="absolute top-1 right-1 w-5 h-5 bg-white text-black flex items-center justify-center text-[10px]"><i class="fas fa-check"></i></div>' : ''}
                `;
                div.onclick = () => toggleGallery(key, previewUrl);
                grid.appendChild(div);
            });
        }).catch(() => {
            grid.innerHTML = '<p class="col-span-full text-red-400/70 text-center text-[12px] py-8">Не удалось загрузить</p>';
        });
    }

    function toggleGallery(key, previewUrl) {
        if (selectedGallery.has(key)) {
            selectedGallery.delete(key);
            galleryPreviewMap.delete(key);
        } else {
            selectedGallery.add(key);
            galleryPreviewMap.set(key, previewUrl || (key.startsWith('external:') ? key.substring(9) : key));
        }
        document.getElementById('gallery-count').textContent = selectedGallery.size;
        loadGallery();
        renderGallerySelection();
    }

    function renderGallerySelection() {
        const hidden = document.getElementById('gallery-selected-hidden');
        hidden.innerHTML = '';
        selectedGallery.forEach(key => {
            const input = document.createElement('input');
            input.type = 'hidden';
            input.name = 'galleryPaths';
            input.value = key;
            hidden.appendChild(input);
        });

        const thumbs = document.getElementById('gallery-thumbs');
        thumbs.innerHTML = '';
        if (selectedGallery.size === 0) {
            thumbs.classList.add('hidden');
            return;
        }
        thumbs.classList.remove('hidden');
        selectedGallery.forEach(key => {
            const previewUrl = galleryPreviewMap.get(key) || key;
            const div = document.createElement('div');
            div.className = 'relative aspect-square bg-[#1a1a1a] overflow-hidden group border border-emerald-400/30';
            div.innerHTML = `
                <img src="${previewUrl}" alt="" class="w-full h-full object-cover"/>
                <button type="button" data-key="${key}" class="gallery-remove absolute top-1 right-1 w-6 h-6 bg-red-500/90 text-white text-[10px] flex items-center justify-center opacity-0 group-hover:opacity-100 transition">
                    <i class="fas fa-times"></i>
                </button>`;
            thumbs.appendChild(div);
        });
        thumbs.querySelectorAll('.gallery-remove').forEach(btn => {
            btn.addEventListener('click', () => toggleGallery(btn.dataset.key));
        });
    }

    function updatePreview(val) {
        document.getElementById('preview-title').textContent = val || 'Название товара';
    }
    function updatePrice(val) {
        document.getElementById('preview-price').textContent = val ? val + ' ₽' : '— ₽';
    }
    function deleteImage(productId, imageId, btn) {
        if (!confirm('Удалить это фото?')) return;
        fetch(`/seller/products/${productId}/images/${imageId}/delete`, { method: 'POST' })
            .then(() => {
                const tile = btn.closest('.relative.aspect-square');
                if (tile) tile.remove();
            });
    }

    function previewImage(input) {
        const files = Array.from(input.files);
        if (files.length === 0) return;
        // Главное превью — первый файл (если у товара ещё нет основного фото)
        const reader = new FileReader();
        reader.onload = e => {
            const img = document.getElementById('preview-new-img');
            img.src = e.target.result;
            img.classList.remove('hidden');
            const cur = document.getElementById('preview-current-img');
            if (cur) cur.classList.add('hidden');
            const ph = document.getElementById('preview-placeholder');
            if (ph) ph.classList.add('hidden');
        };
        reader.readAsDataURL(files[0]);
        // Миниатюры всех новых файлов
        const thumbs = document.getElementById('upload-thumbs');
        thumbs.innerHTML = '';
        files.forEach(file => {
            const r = new FileReader();
            r.onload = e => {
                const div = document.createElement('div');
                div.className = 'aspect-square bg-[#1a1a1a] overflow-hidden border border-emerald-400/30';
                div.innerHTML = `<img src="${e.target.result}" alt="" class="w-full h-full object-cover">`;
                thumbs.appendChild(div);
            };
            r.readAsDataURL(file);
        });
        thumbs.classList.remove('hidden');
    }
</script>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
