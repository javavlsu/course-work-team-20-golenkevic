<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:replace="~{layout :: layout(~{::section})}">
<section class="max-w-3xl mx-auto px-4 py-8">
    <h1 class="text-3xl font-bold text-gray-800 mb-6">Редактировать товар</h1>
    <div class="bg-white rounded-xl shadow-sm p-8">
        <form th:action="@{'/seller/products/' + ${productId} + '/edit'}" method="post" enctype="multipart/form-data" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Название</label>
                <input type="text" name="title" th:value="${productDto.title}" required class="w-full px-4 py-2 border rounded-lg">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Описание</label>
                <textarea name="description" rows="4" class="w-full px-4 py-2 border rounded-lg" th:text="${productDto.description}"></textarea>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Цена (₽)</label>
                    <input type="number" name="price" step="0.01" th:value="${productDto.price}" required class="w-full px-4 py-2 border rounded-lg">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Состояние</label>
                    <select name="condition" class="w-full px-4 py-2 border rounded-lg">
                        <option th:each="c : ${conditions}" th:value="${c}" th:text="${c}" th:selected="${c == productDto.condition}"></option>
                    </select>
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Категория</label>
                <select name="categoryId" class="w-full px-4 py-2 border rounded-lg">
                    <option value="">Без категории</option>
                    <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}" th:selected="${cat.id == productDto.categoryId}"></option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Новая фотография</label>
                <input type="file" name="image" accept="image/*" class="w-full px-4 py-2 border rounded-lg">
            </div>
            <button type="submit" class="w-full bg-indigo-600 text-white py-3 rounded-lg hover:bg-indigo-700">Сохранить</button>
        </form>
    </div>
</section>
</div>
</body>
</html>
