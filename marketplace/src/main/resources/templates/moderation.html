<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:replace="~{layout :: layout(~{::section})}">
<section class="max-w-5xl mx-auto px-4 py-8">
    <h1 class="text-3xl font-bold text-gray-800 mb-6"><i class="fas fa-shield-alt"></i> Модерация товаров</h1>
    <div th:if="${#lists.isEmpty(pendingProducts)}" class="text-center py-16 text-gray-400">
        <p class="text-xl">Нет товаров на модерации</p>
    </div>
    <div th:each="p : ${pendingProducts}" class="bg-white rounded-xl shadow-sm p-6 mb-4 flex items-center justify-between">
        <div>
            <h3 class="font-semibold text-gray-800" th:text="${p.title}"></h3>
            <p class="text-sm text-gray-500">Продавец: <span th:text="${p.seller.username}"></span></p>
            <p class="text-sm text-gray-500" th:text="${p.price} + ' ₽'"></p>
            <p class="text-sm text-gray-400 mt-1" th:text="${#strings.abbreviate(p.description, 100)}"></p>
        </div>
        <div class="flex gap-2">
            <form th:action="@{'/moderation/approve/' + ${p.id}}" method="post">
                <button class="px-4 py-2 bg-emerald-600 text-white rounded-lg hover:bg-emerald-700"><i class="fas fa-check"></i> Одобрить</button>
            </form>
            <form th:action="@{'/moderation/reject/' + ${p.id}}" method="post">
                <button class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700"><i class="fas fa-times"></i> Отклонить</button>
            </form>
        </div>
    </div>
</section>
</div>
</body>
</html>
