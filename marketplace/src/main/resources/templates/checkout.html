<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:replace="~{layout :: layout(~{::section})}">
<section class="max-w-3xl mx-auto px-4 py-8">
    <h1 class="text-3xl font-bold text-gray-800 mb-6">Оформление заказа</h1>
    <div class="bg-white rounded-xl shadow-sm p-8">
        <form th:action="@{/orders/checkout}" method="post" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">ФИО получателя</label>
                <input type="text" name="contactName" required class="w-full px-4 py-2 border rounded-lg">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Телефон</label>
                <input type="text" name="contactPhone" required class="w-full px-4 py-2 border rounded-lg">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Адрес доставки</label>
                <textarea name="deliveryAddress" required rows="3" class="w-full px-4 py-2 border rounded-lg"></textarea>
            </div>
            <div class="text-right">
                <span class="text-xl font-bold text-gray-800">Итого: <span class="text-indigo-600" th:text="${total} + ' ₽'"></span></span>
            </div>
            <button type="submit" class="w-full bg-indigo-600 text-white py-3 rounded-lg hover:bg-indigo-700 text-lg">Подтвердить заказ</button>
        </form>
    </div>
</section>
</div>
</body>
</html>
