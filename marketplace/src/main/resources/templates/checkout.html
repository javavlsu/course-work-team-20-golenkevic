<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARKETPLACE — Оформление</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #e5e5e5; }</style>
</head>
<body class="min-h-screen flex flex-col bg-[#0a0a0a]">
<div th:replace="~{fragments/header :: header}"></div>
<main class="flex-1 pt-16">
<section class="max-w-[600px] mx-auto px-6 py-12">
    <h1 class="text-white text-[13px] uppercase tracking-[0.25em] font-medium mb-10">Оформление заказа</h1>
    <form th:action="@{/orders/checkout}" method="post" class="space-y-6">
        <div>
            <label class="block text-white/40 text-[11px] uppercase tracking-[0.2em] mb-2">ФИО получателя</label>
            <input type="text" name="contactName" required class="w-full bg-transparent border-b border-white/20 text-white text-[15px] py-2.5 focus:border-white outline-none transition">
        </div>
        <div>
            <label class="block text-white/40 text-[11px] uppercase tracking-[0.2em] mb-2">Телефон</label>
            <input type="text" name="contactPhone" required class="w-full bg-transparent border-b border-white/20 text-white text-[15px] py-2.5 focus:border-white outline-none transition">
        </div>
        <div>
            <label class="block text-white/40 text-[11px] uppercase tracking-[0.2em] mb-2">Адрес доставки</label>
            <textarea name="deliveryAddress" required rows="3" class="w-full bg-transparent border border-white/15 text-white text-[14px] px-4 py-3 focus:border-white/30 outline-none transition resize-none"></textarea>
        </div>
        <div class="pt-4 border-t border-white/10">
            <span class="text-white text-[20px] font-light">Итого: <span th:text="${total} + ' ₽'"></span></span>
        </div>
        <button type="submit" class="w-full py-3.5 bg-white text-black text-[13px] uppercase tracking-[0.2em] font-medium hover:bg-white/90 transition">Подтвердить заказ</button>
    </form>
</section>
</main>
<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
