<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARKETPLACE — Оформление заказа</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #e5e5e5; }</style>
</head>
<body class="min-h-screen flex flex-col bg-[#0a0a0a]">
<div th:replace="~{fragments/header :: header}"></div>
<main class="flex-1 pt-16">
<section class="max-w-[1100px] mx-auto px-6 py-12">

    <!-- Хлебные крошки -->
    <nav class="flex items-center gap-2 text-[11px] uppercase tracking-[0.15em] text-white/25 mb-10">
        <a href="/cart" class="hover:text-white/50 transition">Корзина</a>
        <span>/</span>
        <span class="text-white/50">Оформление</span>
    </nav>

    <h1 class="text-white text-[13px] uppercase tracking-[0.25em] font-medium mb-10">Оформление заказа</h1>

    <div class="grid grid-cols-1 lg:grid-cols-[1fr_360px] gap-10 items-start">

        <!-- ═══ ФОРМА ═══ -->
        <form th:action="@{/orders/checkout}" method="post" class="space-y-8">

            <!-- Получатель -->
            <div class="bg-[#111] border border-white/8 p-8">
                <p class="text-white/40 text-[11px] uppercase tracking-[0.25em] mb-6 flex items-center gap-2">
                    <i class="fas fa-user text-[10px]"></i> Данные получателя
                </p>
                <div class="space-y-5">
                    <div>
                        <label for="contactName" class="block text-white/35 text-[10px] uppercase tracking-[0.2em] mb-2">ФИО</label>
                        <input id="contactName" type="text" name="contactName" required placeholder="Иванов Иван Иванович"
                               class="w-full bg-white/4 border border-white/10 text-white text-[14px] px-4 py-3 focus:border-white/35 outline-none transition placeholder:text-white/20">
                    </div>
                    <div>
                        <label for="contactPhone" class="block text-white/35 text-[10px] uppercase tracking-[0.2em] mb-2">Телефон</label>
                        <div class="relative">
                            <i class="fas fa-phone absolute left-4 top-1/2 -translate-y-1/2 text-white/20 text-[11px]"></i>
                            <input id="contactPhone" type="tel" name="contactPhone" required placeholder="+7 (999) 000-00-00"
                                   class="w-full bg-white/4 border border-white/10 text-white text-[14px] pl-10 pr-4 py-3 focus:border-white/35 outline-none transition placeholder:text-white/20">
                        </div>
                    </div>
                </div>
            </div>

            <!-- Доставка -->
            <div class="bg-[#111] border border-white/8 p-8">
                <p class="text-white/40 text-[11px] uppercase tracking-[0.25em] mb-6 flex items-center gap-2">
                    <i class="fas fa-map-marker-alt text-[10px]"></i> Адрес доставки
                </p>
                <div>
                    <label for="deliveryAddress" class="block text-white/35 text-[10px] uppercase tracking-[0.2em] mb-2">Полный адрес</label>
                    <textarea id="deliveryAddress" name="deliveryAddress" required rows="3"
                              placeholder="Город, улица, дом, квартира, индекс"
                              class="w-full bg-white/4 border border-white/10 text-white text-[14px] px-4 py-3 focus:border-white/35 outline-none transition placeholder:text-white/20 resize-none"></textarea>
                </div>
            </div>

            <!-- Кнопка (мобильная) -->
            <button type="submit"
                    class="lg:hidden w-full py-4 bg-white text-black text-[12px] uppercase tracking-[0.25em] font-medium hover:bg-white/90 transition">
                Подтвердить заказ — <span th:text="${total} + ' ₽'"></span>
            </button>
        </form>

        <!-- ═══ СВОДКА ЗАКАЗА (sticky) ═══ -->
        <div class="lg:sticky lg:top-24">
            <div class="bg-[#111] border border-white/8 p-8">
                <p class="text-white/40 text-[11px] uppercase tracking-[0.25em] mb-6">Ваш заказ</p>

                <!-- Товары -->
                <div class="space-y-4 mb-6">
                    <div th:each="item : ${cartItems}" class="flex gap-3 items-start">
                        <div class="w-12 h-16 bg-[#1a1a1a] flex-shrink-0 overflow-hidden">
                            <img th:if="${item.product.imageData != null}"
                                 th:src="@{'/product/' + ${item.product.id} + '/image'}"
                                 alt="" class="w-full h-full object-cover"/>
                            <div th:unless="${item.product.imageData != null}"
                                 class="w-full h-full flex items-center justify-center">
                                <i class="fas fa-image text-white/10 text-sm"></i>
                            </div>
                        </div>
                        <div class="flex-1 min-w-0">
                            <p class="text-white/70 text-[12px] line-clamp-2 leading-snug" th:text="${item.product.title}"></p>
                            <p class="text-white/40 text-[11px] mt-1" th:text="${item.product.price} + ' ₽'"></p>
                        </div>
                    </div>
                </div>

                <!-- Итог -->
                <div class="border-t border-white/10 pt-5 mb-8">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-white/40 text-[12px]">Товары</span>
                        <span class="text-white/60 text-[13px]" th:text="${total} + ' ₽'"></span>
                    </div>
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-white/40 text-[12px]">Доставка</span>
                        <span class="text-emerald-400/70 text-[12px]">Бесплатно</span>
                    </div>
                    <div class="flex justify-between items-center pt-3 border-t border-white/8 mt-3">
                        <span class="text-white/50 text-[12px] uppercase tracking-[0.15em]">Итого</span>
                        <span class="text-white text-[22px] font-light" th:text="${total} + ' ₽'"></span>
                    </div>
                </div>

                <!-- Кнопка (десктоп) -->
                <button form="checkoutForm" type="submit" onclick="document.querySelector('form').submit()"
                        class="w-full py-4 bg-white text-black text-[12px] uppercase tracking-[0.25em] font-medium hover:bg-white/90 active:bg-white/80 transition">
                    Подтвердить заказ
                </button>

                <p class="text-center text-white/20 text-[11px] mt-4 flex items-center justify-center gap-1.5">
                    <i class="fas fa-shield-alt text-[9px]"></i> Данные защищены
                </p>
            </div>
        </div>

    </div>
</section>
</main>
<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
