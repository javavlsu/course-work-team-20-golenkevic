<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:replace="~{layout :: layout(~{::section})}">
<section class="max-w-5xl mx-auto px-4 py-8">
    <div class="bg-white rounded-xl shadow-sm p-8 mb-8">
        <div class="flex items-center gap-6">
            <div class="w-24 h-24 bg-indigo-100 rounded-full flex items-center justify-center">
                <img th:if="${user.profilePic != null}" th:src="@{'/profile/' + ${user.id} + '/avatar'}" class="w-24 h-24 rounded-full object-cover"/>
                <i th:unless="${user.profilePic != null}" class="fas fa-user text-indigo-400 text-3xl"></i>
            </div>
            <div>
                <h1 class="text-2xl font-bold text-gray-800" th:text="${user.username}"></h1>
                <p class="text-gray-500" th:text="${user.email}"></p>
                <span class="px-3 py-1 bg-indigo-100 text-indigo-600 text-sm rounded-full" th:text="${user.role}"></span>
            </div>
        </div>
        <p class="mt-4 text-gray-600" th:if="${user.bio}" th:text="${user.bio}"></p>
    </div>

    <h2 class="text-xl font-semibold text-gray-800 mb-4">Избранное</h2>
    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-8">
        <div th:each="fav : ${favorites}" class="bg-white p-4 rounded-xl shadow-sm">
            <a th:href="@{'/product/' + ${fav.product.id}}" class="font-semibold text-indigo-600 hover:underline" th:text="${fav.product.title}"></a>
            <p class="text-sm text-gray-500" th:text="${fav.product.price} + ' ₽'"></p>
        </div>
    </div>

    <h2 class="text-xl font-semibold text-gray-800 mb-4">Мои отзывы</h2>
    <div th:each="r : ${reviews}" class="bg-white p-4 rounded-xl shadow-sm mb-3">
        <a th:href="@{'/product/' + ${r.product.id}}" class="font-semibold text-indigo-600 hover:underline" th:text="${r.product.title}"></a>
        <span class="text-yellow-500 ml-2"><i class="fas fa-star"></i> <span th:text="${r.rating}"></span></span>
        <p class="text-gray-600 mt-1" th:text="${r.text}"></p>
    </div>
</section>
</div>
</body>
</html>
