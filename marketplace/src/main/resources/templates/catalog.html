<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARKETPLACE — Каталог</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #e5e5e5; }
        .filter-chips::-webkit-scrollbar { display: none; }
        .filter-chips { scrollbar-width: none; }
    </style>
</head>
<body class="min-h-screen flex flex-col bg-[#0a0a0a]">
<div th:replace="~{fragments/header :: header}"></div>
<main class="flex-1 pt-16">

<!-- ═══ ФИЛЬТР-БАР (sticky) ═══ -->
<div class="sticky top-16 z-30 bg-[#0a0a0a] border-b border-white/10">
    <form method="get" action="/catalog" id="filterForm">

        <!-- Строка 1: поиск + цена + кнопка -->
        <div class="max-w-[1400px] mx-auto px-6 pt-3 pb-2 flex flex-wrap items-center gap-2">
            <!-- Поиск -->
            <div class="relative">
                <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-white/25 text-[11px]"></i>
                <input type="text" name="search" th:value="${search}"
                       placeholder="Поиск..."
                       class="bg-white/5 border border-white/10 text-white text-[13px] pl-8 pr-4 py-2 w-52 focus:border-white/30 outline-none transition placeholder:text-white/25">
            </div>
            <!-- Цена от — до -->
            <div class="flex items-center gap-1">
                <input type="number" name="minPrice" th:value="${minPrice}" step="0.01" placeholder="от ₽"
                       class="bg-white/5 border border-white/10 text-white text-[13px] px-3 py-2 w-24 focus:border-white/30 outline-none transition placeholder:text-white/25">
                <span class="text-white/20 text-[12px]">—</span>
                <input type="number" name="maxPrice" th:value="${maxPrice}" step="0.01" placeholder="до ₽"
                       class="bg-white/5 border border-white/10 text-white text-[13px] px-3 py-2 w-24 focus:border-white/30 outline-none transition placeholder:text-white/25">
            </div>
            <!-- Применить -->
            <button type="submit"
                    class="px-5 py-2 bg-white text-black text-[11px] uppercase tracking-[0.15em] hover:bg-white/90 transition">
                Найти
            </button>
            <!-- Сбросить -->
            <a href="/catalog"
               th:if="${search != null or selectedCategory != null or selectedBrand != null or selectedCondition != null or selectedGender != null or selectedSeason != null or selectedColor != null or selectedMaterial != null or selectedSize != null or minPrice != null or maxPrice != null}"
               class="flex items-center gap-1.5 text-white/35 text-[11px] uppercase tracking-[0.1em] hover:text-white/70 transition">
                <i class="fas fa-times text-[10px]"></i> Сбросить
            </a>
        </div>

        <!-- Строка 2: категории + бренд + пол + состояние + сезон (горизонтальный скролл) -->
        <div class="filter-chips overflow-x-auto">
            <div class="max-w-[1400px] mx-auto px-6 pb-3 flex items-center gap-1.5 whitespace-nowrap">

                <!-- Категория -->
                <span class="text-white/25 text-[10px] uppercase tracking-[0.2em] mr-2">Категория</span>
                <button type="submit" name="categoryId" value=""
                        th:class="${selectedCategory == null}
                            ? 'px-3.5 py-1.5 text-[11px] uppercase tracking-[0.1em] bg-white text-black'
                            : 'px-3.5 py-1.5 text-[11px] uppercase tracking-[0.1em] border border-white/15 text-white/55 hover:border-white/40 hover:text-white/80 transition'">
                    Все
                </button>
                <button th:each="cat : ${categories}"
                        type="submit" th:name="categoryId" th:value="${cat.id}" th:text="${cat.name}"
                        th:class="${cat.id == selectedCategory}
                            ? 'px-3.5 py-1.5 text-[11px] uppercase tracking-[0.1em] bg-white text-black'
                            : 'px-3.5 py-1.5 text-[11px] uppercase tracking-[0.1em] border border-white/15 text-white/55 hover:border-white/40 hover:text-white/80 transition'">
                </button>

                <span class="w-px h-4 bg-white/15 mx-2"></span>

                <!-- Пол -->
                <span class="text-white/25 text-[10px] uppercase tracking-[0.2em] mr-2">Пол</span>
                <button type="submit" name="gender" value=""
                        th:class="${selectedGender == null}
                            ? 'px-3.5 py-1.5 text-[11px] uppercase tracking-[0.1em] bg-white/15 text-white border border-white/30'
                            : 'px-3.5 py-1.5 text-[11px] uppercase tracking-[0.1em] border border-white/15 text-white/55 hover:border-white/40 hover:text-white/80 transition'">
                    Все
                </button>
                <button th:each="g : ${genders}" type="submit" th:name="gender" th:value="${g}" th:text="${g}"
                        th:class="${g == selectedGender}
                            ? 'px-3.5 py-1.5 text-[11px] uppercase tracking-[0.1em] bg-white/15 text-white border border-white/30'
                            : 'px-3.5 py-1.5 text-[11px] uppercase tracking-[0.1em] border border-white/15 text-white/55 hover:border-white/40 hover:text-white/80 transition'">
                </button>

                <span class="w-px h-4 bg-white/15 mx-2"></span>

                <!-- Состояние -->
                <span class="text-white/25 text-[10px] uppercase tracking-[0.2em] mr-2">Состояние</span>
                <button type="submit" name="condition" value=""
                        th:class="${selectedCondition == null}
                            ? 'px-3.5 py-1.5 text-[11px] uppercase tracking-[0.1em] bg-white/15 text-white border border-white/30'
                            : 'px-3.5 py-1.5 text-[11px] uppercase tracking-[0.1em] border border-white/15 text-white/55 hover:border-white/40 hover:text-white/80 transition'">
                    Любое
                </button>
                <button th:each="c : ${conditions}"
                        type="submit" th:name="condition" th:value="${c}" th:text="${c}"
                        th:class="${c == selectedCondition}
                            ? 'px-3.5 py-1.5 text-[11px] uppercase tracking-[0.1em] bg-white/15 text-white border border-white/30'
                            : 'px-3.5 py-1.5 text-[11px] uppercase tracking-[0.1em] border border-white/15 text-white/55 hover:border-white/40 hover:text-white/80 transition'">
                </button>

            </div>
        </div>

        <!-- Строка 3: бренд + сезон + цвет + материал + размер -->
        <div class="filter-chips overflow-x-auto border-t border-white/5">
            <div class="max-w-[1400px] mx-auto px-6 py-3 flex items-center gap-1.5 whitespace-nowrap">
                <!-- Бренд -->
                <span class="text-white/25 text-[10px] uppercase tracking-[0.2em] mr-2">Бренд</span>
                <select name="brandId" onchange="this.form.submit()"
                        class="bg-[#1a1a1a] border border-white/10 text-white/70 text-[12px] px-3 py-1.5 focus:border-white/30 outline-none transition">
                    <option value="">Любой</option>
                    <option th:each="br : ${brands}" th:value="${br.id}" th:text="${br.name}" th:selected="${br.id == selectedBrand}"></option>
                </select>

                <span class="w-px h-4 bg-white/15 mx-2"></span>

                <!-- Сезон -->
                <span class="text-white/25 text-[10px] uppercase tracking-[0.2em] mr-2">Сезон</span>
                <select name="season" onchange="this.form.submit()"
                        class="bg-[#1a1a1a] border border-white/10 text-white/70 text-[12px] px-3 py-1.5 focus:border-white/30 outline-none transition">
                    <option value="">Любой</option>
                    <option th:each="s : ${seasons}" th:value="${s}" th:text="${s}" th:selected="${s == selectedSeason}"></option>
                </select>

                <span class="w-px h-4 bg-white/15 mx-2"></span>

                <!-- Цвет -->
                <span class="text-white/25 text-[10px] uppercase tracking-[0.2em] mr-2">Цвет</span>
                <select name="color" onchange="this.form.submit()"
                        class="bg-[#1a1a1a] border border-white/10 text-white/70 text-[12px] px-3 py-1.5 focus:border-white/30 outline-none transition">
                    <option value="">Любой</option>
                    <option th:each="c : ${availableColors}" th:value="${c}" th:text="${c}" th:selected="${c == selectedColor}"></option>
                </select>

                <span class="w-px h-4 bg-white/15 mx-2"></span>

                <!-- Материал -->
                <span class="text-white/25 text-[10px] uppercase tracking-[0.2em] mr-2">Материал</span>
                <select name="material" onchange="this.form.submit()"
                        class="bg-[#1a1a1a] border border-white/10 text-white/70 text-[12px] px-3 py-1.5 focus:border-white/30 outline-none transition">
                    <option value="">Любой</option>
                    <option th:each="m : ${availableMaterials}" th:value="${m}" th:text="${m}" th:selected="${m == selectedMaterial}"></option>
                </select>

                <span class="w-px h-4 bg-white/15 mx-2"></span>

                <!-- Размер -->
                <span class="text-white/25 text-[10px] uppercase tracking-[0.2em] mr-2">Размер</span>
                <select name="size" onchange="this.form.submit()"
                        class="bg-[#1a1a1a] border border-white/10 text-white/70 text-[12px] px-3 py-1.5 focus:border-white/30 outline-none transition">
                    <option value="">Любой</option>
                    <option th:each="sz : ${availableSizes}" th:value="${sz}" th:text="${sz}" th:selected="${sz == selectedSize}"></option>
                </select>
            </div>
        </div>
    </form>
</div>

<!-- ═══ КАТАЛОГ ═══ -->
<section class="max-w-[1400px] mx-auto px-6 py-10">

    <!-- Заголовок + счётчик + сортировка -->
    <div class="flex flex-wrap items-center justify-between gap-3 mb-8">
        <div class="flex items-baseline gap-3">
            <h1 class="text-white text-[13px] uppercase tracking-[0.25em] font-medium">Каталог</h1>
            <p class="text-white/30 text-[12px]" th:text="${totalItems} + ' товаров'"></p>
        </div>
        <form method="get" action="/catalog" id="sortForm" class="flex items-center gap-2">
            <input type="hidden" name="search" th:value="${search}"/>
            <input type="hidden" name="categoryId" th:value="${selectedCategory}"/>
            <input type="hidden" name="brandId" th:value="${selectedBrand}"/>
            <input type="hidden" name="condition" th:value="${selectedCondition}"/>
            <input type="hidden" name="gender" th:value="${selectedGender}"/>
            <input type="hidden" name="season" th:value="${selectedSeason}"/>
            <input type="hidden" name="color" th:value="${selectedColor}"/>
            <input type="hidden" name="material" th:value="${selectedMaterial}"/>
            <input type="hidden" name="size" th:value="${selectedSize}"/>
            <input type="hidden" name="minPrice" th:value="${minPrice}"/>
            <input type="hidden" name="maxPrice" th:value="${maxPrice}"/>
            <label for="sort-select" class="text-white/30 text-[10px] uppercase tracking-[0.2em]">Сортировка:</label>
            <select id="sort-select" name="sort" onchange="document.getElementById('sortForm').submit()"
                    class="bg-[#1a1a1a] border border-white/10 text-white/80 text-[12px] px-3 py-1.5 focus:border-white/30 outline-none transition">
                <option value="createdAt" th:selected="${currentSort == 'createdAt'}">Сначала новые</option>
                <option value="priceAsc" th:selected="${currentSort == 'priceAsc'}">Цена: дешевле</option>
                <option value="priceDesc" th:selected="${currentSort == 'priceDesc'}">Цена: дороже</option>
                <option value="title" th:selected="${currentSort == 'title'}">По названию</option>
            </select>
        </form>
    </div>

    <!-- Пустой результат -->
    <div th:if="${#lists.isEmpty(products.content)}" class="py-24 text-center">
        <i class="fas fa-search text-white/10 text-5xl mb-6"></i>
        <p class="text-white/30 text-[13px] uppercase tracking-[0.2em]">Ничего не найдено</p>
        <a href="/catalog" class="mt-6 inline-block text-white/40 text-[12px] uppercase tracking-[0.15em] hover:text-white/70 transition">Сбросить фильтры</a>
    </div>

    <!-- Адаптивная сетка -->
    <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-3 md:gap-4">
        <a th:each="p : ${products}" th:href="@{'/product/' + ${p.id}}" class="group block">
            <div class="aspect-[3/4] bg-[#161616] overflow-hidden relative">
                <img th:if="${p.hasImage}" th:src="@{'/product/' + ${p.id} + '/image'}" alt=""
                     class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500"/>
                <div th:unless="${p.hasImage}" class="w-full h-full flex items-center justify-center">
                    <i class="fas fa-image text-white/10 text-4xl"></i>
                </div>

                <!-- Бейджи -->
                <div class="absolute top-2 left-2 flex flex-col gap-1.5 z-10">
                    <span th:if="${p.discountPercent != null}"
                          class="bg-red-500 text-white text-[10px] font-bold uppercase tracking-wider px-2 py-1"
                          th:text="'-' + ${p.discountPercent} + '%'"></span>
                    <span th:if="${p.isNew and p.discountPercent == null}"
                          class="bg-emerald-400 text-black text-[10px] font-bold uppercase tracking-wider px-2 py-1">
                        New
                    </span>
                </div>

                <!-- Градиентный оверлей -->
                <div class="absolute inset-0 bg-gradient-to-t from-black/85 via-black/10 to-transparent"></div>
                <!-- Информация поверх фото -->
                <div class="absolute bottom-0 left-0 right-0 p-4 translate-y-1 group-hover:translate-y-0 transition-transform duration-300">
                    <p class="text-white/55 text-[10px] uppercase tracking-[0.2em] mb-1 opacity-0 group-hover:opacity-100 transition-opacity duration-300"
                       th:text="${p.categoryName}"></p>
                    <p class="text-white text-[13px] leading-snug line-clamp-2 mb-2" th:text="${p.title}"></p>
                    <div class="flex items-end justify-between gap-2">
                        <div class="flex flex-col">
                            <span th:if="${p.oldPrice != null and p.discountPercent != null}"
                                  class="text-white/35 text-[11px] line-through" th:text="${p.oldPrice} + ' ₽'"></span>
                            <p th:classappend="${p.discountPercent != null} ? 'text-red-400 text-[15px] font-bold' : 'text-white text-[15px] font-semibold'"
                               th:text="${p.price} + ' ₽'"></p>
                        </div>
                        <span class="text-yellow-400/80 text-[11px] flex items-center gap-1" th:if="${p.averageRating != null}">
                            <i class="fas fa-star text-[9px]"></i>
                            <span th:text="${#numbers.formatDecimal(p.averageRating, 1, 1)}"></span>
                        </span>
                    </div>
                </div>
            </div>
        </a>
    </div>

    <!-- Пагинация -->
    <div class="mt-12 flex justify-center gap-1" th:if="${totalPages > 1}">
        <a th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
           th:href="@{/catalog(page=${i}, search=${search}, categoryId=${selectedCategory}, condition=${selectedCondition}, minPrice=${minPrice}, maxPrice=${maxPrice})}"
           th:text="${i + 1}"
           th:class="${i == currentPage}
               ? 'w-10 h-10 flex items-center justify-center bg-white text-black text-[13px]'
               : 'w-10 h-10 flex items-center justify-center border border-white/15 text-white/50 text-[13px] hover:border-white/40 transition'">
        </a>
    </div>

</section>
</main>
<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
