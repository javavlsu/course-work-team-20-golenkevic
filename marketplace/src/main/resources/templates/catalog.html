<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:replace="~{layout :: layout(~{::section})}">
<section class="max-w-7xl mx-auto px-4 py-8">
    <h1 class="text-3xl font-bold text-gray-800 mb-6">Каталог товаров</h1>
    <div class="flex gap-8">
        <!-- Фильтры -->
        <aside class="w-64 flex-shrink-0">
            <form method="get" action="/catalog" class="bg-white p-6 rounded-xl shadow-sm space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Поиск</label>
                    <input type="text" name="search" th:value="${search}" placeholder="Название..." class="w-full px-3 py-2 border rounded-lg">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Категория</label>
                    <select name="categoryId" class="w-full px-3 py-2 border rounded-lg">
                        <option value="">Все</option>
                        <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}" th:selected="${cat.id == selectedCategory}"></option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Цена от</label>
                    <input type="number" name="minPrice" step="0.01" class="w-full px-3 py-2 border rounded-lg">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Цена до</label>
                    <input type="number" name="maxPrice" step="0.01" class="w-full px-3 py-2 border rounded-lg">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Состояние</label>
                    <select name="condition" class="w-full px-3 py-2 border rounded-lg">
                        <option value="">Любое</option>
                        <option th:each="c : ${conditions}" th:value="${c}" th:text="${c}"></option>
                    </select>
                </div>
                <button type="submit" class="w-full bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700">Применить</button>
            </form>
        </aside>
        <!-- Товары -->
        <div class="flex-1">
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                <div th:each="p : ${products}" class="bg-white rounded-xl shadow-sm overflow-hidden hover:shadow-md transition">
                    <div th:class="'h-40 bg-gradient-to-br ' + ${p.themeColor} + ' flex items-center justify-center'">
                        <img th:if="${p.hasImage}" th:src="@{'/product/' + ${p.id} + '/image'}" class="h-full w-full object-cover"/>
                        <i th:unless="${p.hasImage}" class="fas fa-image text-white text-4xl"></i>
                    </div>
                    <div class="p-4">
                        <h3 class="font-semibold text-gray-800 truncate" th:text="${p.title}"></h3>
                        <p class="text-sm text-gray-500" th:text="${p.categoryName}"></p>
                        <div class="flex items-center justify-between mt-2">
                            <span class="text-indigo-600 font-bold text-lg" th:text="${p.price} + ' ₽'"></span>
                            <span class="text-sm text-yellow-500" th:if="${p.averageRating != null}">
                                <i class="fas fa-star"></i> <span th:text="${#numbers.formatDecimal(p.averageRating, 1, 1)}"></span>
                            </span>
                        </div>
                        <a th:href="@{'/product/' + ${p.id}}" class="mt-2 block text-center bg-indigo-50 text-indigo-600 py-2 rounded-lg hover:bg-indigo-100">Подробнее</a>
                    </div>
                </div>
            </div>
            <!-- Пагинация -->
            <div class="mt-8 flex justify-center gap-2" th:if="${totalPages > 1}">
                <a th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                   th:href="@{/catalog(page=${i}, search=${search}, categoryId=${selectedCategory})}"
                   th:text="${i + 1}"
                   th:class="${i == currentPage} ? 'px-4 py-2 bg-indigo-600 text-white rounded-lg' : 'px-4 py-2 bg-white text-gray-600 rounded-lg hover:bg-gray-100'"></a>
            </div>
        </div>
    </div>
</section>
</div>
</body>
</html>
