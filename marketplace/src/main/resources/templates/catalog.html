<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARKETPLACE — Каталог</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #e5e5e5; }</style>
</head>
<body class="min-h-screen flex flex-col bg-[#0a0a0a]">
<div th:replace="~{fragments/header :: header}"></div>
<main class="flex-1 pt-16">
<section class="max-w-[1400px] mx-auto px-6 py-12">
    <h1 class="text-white text-[13px] uppercase tracking-[0.25em] font-medium mb-10">Каталог</h1>
    <form method="get" action="/catalog" class="flex flex-wrap gap-4 mb-10 pb-8 border-b border-white/10">
        <input type="text" name="search" th:value="${search}" placeholder="Поиск..." class="bg-transparent border border-white/15 text-white text-[13px] px-4 py-2.5 w-56 focus:border-white/40 outline-none transition placeholder:text-white/30">
        <select name="categoryId" class="bg-[#0a0a0a] border border-white/15 text-white/70 text-[13px] px-4 py-2.5">
            <option value="">Все категории</option>
            <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}" th:selected="${cat.id == selectedCategory}"></option>
        </select>
        <select name="condition" class="bg-[#0a0a0a] border border-white/15 text-white/70 text-[13px] px-4 py-2.5">
            <option value="">Любое состояние</option>
            <option th:each="c : ${conditions}" th:value="${c}" th:text="${c}"></option>
        </select>
        <input type="number" name="minPrice" step="0.01" placeholder="Цена от" class="bg-transparent border border-white/15 text-white text-[13px] px-4 py-2.5 w-32 focus:border-white/40 outline-none transition placeholder:text-white/30">
        <input type="number" name="maxPrice" step="0.01" placeholder="Цена до" class="bg-transparent border border-white/15 text-white text-[13px] px-4 py-2.5 w-32 focus:border-white/40 outline-none transition placeholder:text-white/30">
        <button type="submit" class="px-6 py-2.5 bg-white text-black text-[12px] uppercase tracking-[0.15em] hover:bg-white/90 transition">Найти</button>
    </form>
    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
        <a th:each="p : ${products}" th:href="@{'/product/' + ${p.id}}" class="group block">
            <div class="aspect-[3/4] bg-[#161616] overflow-hidden relative">
                <img th:if="${p.hasImage}" th:src="@{'/product/' + ${p.id} + '/image'}" alt="" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500"/>
                <div th:unless="${p.hasImage}" class="w-full h-full flex items-center justify-center"><i class="fas fa-image text-white/10 text-4xl"></i></div>
                <!-- Градиентный оверлей -->
                <div class="absolute inset-0 bg-gradient-to-t from-black/85 via-black/10 to-transparent"></div>
                <!-- Информация поверх фото -->
                <div class="absolute bottom-0 left-0 right-0 p-4 translate-y-1 group-hover:translate-y-0 transition-transform duration-300">
                    <p class="text-white/55 text-[10px] uppercase tracking-[0.2em] mb-1 opacity-0 group-hover:opacity-100 transition-opacity duration-300" th:text="${p.categoryName}"></p>
                    <p class="text-white text-[13px] leading-snug line-clamp-2 mb-2" th:text="${p.title}"></p>
                    <div class="flex items-center justify-between">
                        <p class="text-white text-[15px] font-semibold" th:text="${p.price} + ' ₽'"></p>
                        <span class="text-yellow-400/80 text-[11px] flex items-center gap-1" th:if="${p.averageRating != null}">
                            <i class="fas fa-star text-[9px]"></i>
                            <span th:text="${#numbers.formatDecimal(p.averageRating, 1, 1)}"></span>
                        </span>
                    </div>
                </div>
            </div>
        </a>
    </div>
    <div class="mt-12 flex justify-center gap-1" th:if="${totalPages > 1}">
        <a th:each="i : ${#numbers.sequence(0, totalPages - 1)}" th:href="@{/catalog(page=${i}, search=${search}, categoryId=${selectedCategory})}" th:text="${i + 1}" th:class="${i == currentPage} ? 'w-10 h-10 flex items-center justify-center bg-white text-black text-[13px]' : 'w-10 h-10 flex items-center justify-center border border-white/15 text-white/50 text-[13px] hover:border-white/40 transition'"></a>
    </div>
</section>
</main>
<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
